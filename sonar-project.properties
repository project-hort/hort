# SonarQube / SonarCloud analysis configuration for Hort.
#
# This file holds the STATIC analysis config: source layout, exclusions,
# coverage report paths, and issue-ignore rules. The CI job
# (`.gitlab-ci.yml` `quality:sonar`) passes only the DYNAMIC / secret args
# at invocation: `sonar.host.url`, `sonar.token`, the optional env-driven
# `sonar.projectKey`, and the per-MR `sonar.pullrequest.*` args. `sonar-scanner`
# auto-reads this file from the repo root; CLI `-D` flags override it, so
# those dynamic args win as intended.
#
# The quality-gate thresholds (coverage on new code >= 85%, duplication on
# new code <= 1%) are enforced by the Sonar gate, not here.

# --- Source layout (Rust workspace under crates/) --------------------------
sonar.sources=crates
sonar.tests=crates
sonar.test.inclusions=**/*test*.rs,**/*tests*.rs,**/tests/**/*.rs

# Non-source trees excluded from analysis entirely.
sonar.exclusions=target/**,docker/**,scripts/**,site/**,docs/**,.sqlx/**

# Coverage: explicitly no coverage exclusions; the lcov/xml reports are
# produced by the `test:coverage` job and consumed here.
sonar.coverage.exclusions=
sonar.rust.lcov.reportPaths=lcov.info
sonar.coverageReportPaths=coverage-sonar.xml

# --- Issue-ignore: test-only private keys ----------------------------------
# Hort's test suite carries hardcoded test-only signing material (JWT/OIDC
# and token-exchange sign-then-verify roundtrips). These are NOT production
# secrets — they are fixtures, already allowlisted for GitGuardian
# (`.gitguardian.yaml`). Suppress the Sonar `secrets` analyzer on exactly the
# files that carry them, scoped to the secrets repo only (bug / vulnerability
# / code-smell rules stay active on these files).
#
# `secrets:*` matches every rule in the secrets analyzer. If your Sonar
# version does not honor the repo wildcard, replace it with the exact rule
# key shown on the finding ("Why is this an issue" -> secrets:Sxxxx).
#
# NOTE: 4 of the 5 entries below are #[cfg(test)] modules embedded in SOURCE
# files (not test-PATHS), so they must be listed individually. This list
# grows whenever a new test key lands in a src module — prefer generating
# test keys on the fly (no hardcoded material at all), which makes this whole
# block unnecessary. See the test-key-hygiene follow-up.
sonar.issue.ignore.multicriteria=tk_testdirs,tk_oidc_lib,tk_oidc_multi,tk_exchange,tk_extraca

# (a) Integration-test files under tests/ (init52 token-exchange / CLI-session).
sonar.issue.ignore.multicriteria.tk_testdirs.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.tk_testdirs.resourceKey=**/tests/**/*.rs

# (b) #[cfg(test)] signing material embedded in source files (enumerated —
#     these are not test-paths, so a path glob would miss them).
sonar.issue.ignore.multicriteria.tk_oidc_lib.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.tk_oidc_lib.resourceKey=**/hort-adapters-oidc/src/lib.rs
sonar.issue.ignore.multicriteria.tk_oidc_multi.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.tk_oidc_multi.resourceKey=**/hort-adapters-oidc/src/multi_issuer.rs
sonar.issue.ignore.multicriteria.tk_exchange.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.tk_exchange.resourceKey=**/hort-http-core/src/handlers/exchange.rs
sonar.issue.ignore.multicriteria.tk_extraca.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.tk_extraca.resourceKey=**/hort-config/src/extra_ca.rs
