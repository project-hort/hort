name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'

permissions: {}

# Concurrency rules:
#
# - The group is keyed by `event_name` + `ref` so push and workflow_dispatch
#   for the same branch are in DIFFERENT groups. A manual run (`workflow_dispatch`)
#   never gets cancelled by an auto run, and vice versa.
# - `cancel-in-progress` is true ONLY for branch pushes (not tag pushes,
#   not workflow_dispatch). When a new commit lands on main while an
#   earlier auto-build is still running, the older one is cancelled so we
#   stop building stale containers.
# - Tag pushes (releases) and manual dispatches always run to completion.
concurrency:
  group: docker-publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository }}-server
  WORKER_IMAGE: ${{ github.repository }}-worker

jobs:
  # Build EVERY published image (server + worker) on EVERY supported arch in a
  # single matrix. The image axis (`server`/`worker`) and the platform axis
  # (`amd64`/`arm64`) are independent, so a worker-specific build failure does
  # not fail the server entries (`fail-fast: false`). The build/sign/attest
  # logic lives once here and in `merge` below — both images stay in lockstep
  # by construction, mirroring the GitLab `.docker` template that the
  # `build-images:hort-server` / `build-images:hort-worker` twins extend.
  build-images:
    name: ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      # Mapped from the secret so the Docker Hub login step can be skipped
      # when no creds are configured (secrets can't be used in `if:`
      # directly). Empty on the public mirror → that step is skipped and
      # base images pull anonymously.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      # Fully-qualified ghcr.io name for this matrix entry's image. Resolves
      # to project-hort/hort-server or project-hort/hort-worker.
      IMAGE_NAME: ${{ github.repository }}-${{ matrix.image }}
    strategy:
      fail-fast: false
      # Both images build on both arches. The server is a pure-Rust build; the
      # worker selects arch-appropriate Trivy + osv-scanner binaries via
      # buildx's TARGETARCH (see docker/Dockerfile.worker). Each leg runs on a
      # native runner (no QEMU): amd64 on ubuntu-latest, arm64 on
      # ubuntu-24.04-arm. `fail-fast: false` keeps a per-leg failure from
      # cancelling the others.
      matrix:
        image: [server, worker]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
          - image: server
            dockerfile: ./docker/Dockerfile.hort-server
          - image: worker
            dockerfile: ./docker/Dockerfile.worker

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to Docker Hub before buildx so any transitive `FROM`
      # base-image pulls from docker.io are not subject to the
      # 100-pull/6h anonymous rate limit.
      - name: Log in to Docker Hub (for transitive base-image pulls)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }},mode=max
          sbom: true
          provenance: mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.image }}-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  scan-containers:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: [build-images]
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: server-digests-amd64
          path: /tmp/server-digests

      - name: Resolve image reference
        id: refs
        run: |
          BACKEND_DIGEST=$(ls /tmp/server-digests/)
          echo "backend=${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}@sha256:${BACKEND_DIGEST}" >> $GITHUB_OUTPUT

      # --- Trivy CVE scanning ---
      # --ignore-unfixed: only fail on CVEs with available patches.
      # Unpatched UBI base image CVEs (Red Hat's responsibility) are still
      # reported in SARIF for visibility but don't block the build.
      # Trivy scans upload SARIF to GitHub Security tab for visibility.
      # The publish-path scan below is BLOCKING on fixable CRITICALs (exit-code
      # 1, INFRA-3); unfixed base-image CVEs still pass (`ignore-unfixed: true`)
      # and accepted ones are tracked in `.trivyignore`.
      # NOTE: trivy binary extracted from official GHCR image because the
      # aquasecurity/trivy GitHub repo was wiped (no releases/tags).
      - name: Install Trivy
        run: |
          CONTAINER_ID=$(docker create ghcr.io/aquasecurity/trivy:0.69.3)
          docker cp "$CONTAINER_ID:/usr/local/bin/trivy" /usr/local/bin/trivy
          docker rm "$CONTAINER_ID"
          trivy --version

      # Publish-path gate: fail the build on any CRITICAL CVE that has a fix
      # available upstream (`ignore-unfixed: true` still lets unpatched base-image
      # CVEs through — those are tracked in `.trivyignore` / the scheduled scan).
      # The SARIF is still produced and uploaded (`if: always()` below) so the
      # Security tab keeps full visibility even when this step fails.
      - name: Trivy scan - Backend
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.refs.outputs.backend }}
          format: 'sarif'
          output: 'backend-trivy.sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          skip-setup-trivy: true

      - name: Upload Backend Trivy SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: 'backend-trivy.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: trivy-scan-reports
          path: |
            backend-trivy.sarif
          retention-days: 90

      - name: Scan summary
        if: always()
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trivy CVE Scan (server image)" >> $GITHUB_STEP_SUMMARY
          echo "- **Policy**: CRITICAL / HIGH CVEs reported (informational; unfixed base-image CVEs do not block)" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: $([ -f backend-trivy.sarif ] && echo 'Scanned' || echo 'Skipped')" >> $GITHUB_STEP_SUMMARY

  # One manifest-list merge + cosign-sign + provenance attestation per image.
  # Matrixed over the same image axis as `build-images`; each entry fans in its
  # own per-arch digests (`<image>-digests-*`) into a single multi-arch tag set.
  merge:
    name: ${{ matrix.image }} Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-images]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write   # emit the storage record for the pushed image
    strategy:
      fail-fast: false
      matrix:
        image: [server, worker]
    env:
      IMAGE_NAME: ${{ github.repository }}-${{ matrix.image }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: ${{ matrix.image }}-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (ghcr.io)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push (ghcr.io)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest}}' \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} | jq -r '.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.inspect.outputs.digest }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════════════════
  # MIRROR-TO-HORT-OCI: publish the first-party images to registry.hort.rs (dogfood)
  #
  # Mirrors the just-merged multi-arch hort-server / hort-worker images — and
  # their cosign signatures + attestations — from ghcr.io to the hosted, public
  # `hort-oci` repo on registry.hort.rs. Gated by vars.HORT_PROXY_ENABLED ==
  # 'true' (default off), so it is a no-op until the instance is live — exactly
  # like the crates publish in release.yml. `environment: release` makes this
  # job's OIDC token carry the `environment: release` claim that the gha-release
  # ServiceAccount matches (developer/write on hort-oci). `cosign copy` (not
  # crane/skopeo) carries the signatures + attestations along with the image, so
  # the mirrored copy verifies the same way the ghcr.io copy does. Requires the
  # protected `release` environment (Settings → Environments → release: tag-only
  # + reviewer) — the same prerequisite as the crates publish.
  # ════════════════════════════════════════════════════════════════════════════
  mirror-to-hort-oci:
    name: Mirror images to registry.hort.rs/hort-oci
    runs-on: ubuntu-latest
    environment: release
    needs: [merge]
    permissions:
      contents: read
      id-token: write   # mint the OIDC token for the gha-release SA exchange
      packages: read    # pull the just-published images from ghcr.io
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      vars.HORT_PROXY_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GitHub Container Registry (read source images)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to registry.hort.rs as the gha-release SA (environment:
      # release ↔ SA claim). The action's docker login writes the registry.hort.rs
      # credential that `cosign copy` reads from ~/.docker/config.json to push.
      - uses: ./.github/actions/hort-auth
        with:
          proxy_enabled: ${{ vars.HORT_PROXY_ENABLED }}

      - name: Mirror images (with signatures + attestations) to hort-oci
        env:
          GHCR: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Mirror the version tag always; add :latest only for a stable release
          # (no pre-release suffix), matching the ghcr.io metadata tagging.
          dest_tags=("${version}")
          case "${version}" in *-*) ;; *) dest_tags+=("latest") ;; esac
          for suffix in server worker; do
            src="${GHCR}/${REPO}-${suffix}:${version}"
            for tag in "${dest_tags[@]}"; do
              dest="registry.hort.rs/hort-oci/hort-${suffix}:${tag}"
              echo "Mirroring ${src} -> ${dest}"
              cosign copy --force "${src}" "${dest}"
            done
          done

  # ════════════════════════════════════════════════════════════════════════════
  # PUBLISH-CHART: package and push the hort-server Helm chart as an OCI
  # artifact to ghcr.io, mirroring the GitLab `helm:lint-and-publish` job. The
  # chart lands at ghcr.io/<owner>/charts/hort-server:<version>. Runs after the
  # images merge so a chart is never published pointing at images that failed
  # to build. helm is preinstalled on the GitHub-hosted ubuntu runner image.
  # ════════════════════════════════════════════════════════════════════════════
  publish-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve chart version
        id: ver
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/v}" ]; then
            # Tag push: vX.Y.Z[-pre] → X.Y.Z[-pre].
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # workflow_dispatch: use the provided tag input, stripping any
            # leading 'v'. The 'latest' sentinel is not a chart version.
            VERSION="${INPUT_TAG#v}"
          fi
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::notice::'${VERSION}' is not a SemVer chart version (e.g. a 'latest' dispatch); skipping chart publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}

      - name: Verify helm is available
        if: steps.ver.outputs.publish == 'true'
        run: helm version

      - name: Log in to GitHub Container Registry (Helm OCI)
        if: steps.ver.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GH_TOKEN}" | helm registry login "${REGISTRY}" --username "${ACTOR}" --password-stdin

      # §3.4 invariant: on a SemVer tag the in-tree Chart.yaml must already
      # declare the tag's version on BOTH `version` and `appVersion` (chart and
      # binary are versioned together). `helm package --version/--app-version`
      # overrides at publish time, but a stale Chart.yaml drifts from §3.4 for
      # source-tree consumers (`helm install ./deploy/...`, `helm template`).
      # Skipped on workflow_dispatch where the version is operator-supplied.
      - name: Assert Chart.yaml matches tag (§3.4)
        if: steps.ver.outputs.publish == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          chart_version=$(grep -E '^version:' deploy/helm/hort-server/Chart.yaml \
            | sed -E 's/^version:[[:space:]]*//;s/^"//;s/"$//')
          chart_app_version=$(grep -E '^appVersion:' deploy/helm/hort-server/Chart.yaml \
            | sed -E 's/^appVersion:[[:space:]]*//;s/^"//;s/"$//')
          if [ "${chart_version}" != "${VERSION}" ] || [ "${chart_app_version}" != "${VERSION}" ]; then
            echo "::error::Chart.yaml drifted from tag v${VERSION} (§3.4 invariant)."
            echo "  Chart.yaml version    = ${chart_version}"
            echo "  Chart.yaml appVersion = ${chart_app_version}"
            echo "  Expected (tag minus 'v') = ${VERSION}"
            echo "Bump deploy/helm/hort-server/Chart.yaml and re-tag."
            exit 1
          fi
          echo "§3.4 invariant ok: Chart.yaml version + appVersion = ${VERSION}"

      - name: Lint, package, and push chart
        if: steps.ver.outputs.publish == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # values.yaml defaults are intentionally invalid (publicBaseUrl empty)
          # so the schema fails on bare values; lint against test-values.yaml.
          helm lint deploy/helm/hort-server/ -f deploy/helm/hort-server/test-values.yaml
          helm package deploy/helm/hort-server/ \
            --app-version "${VERSION}" \
            --version "${VERSION}"
          helm push hort-server-*.tgz "oci://${REGISTRY}/${OWNER}/charts"
          echo "Pushed chart to oci://${REGISTRY}/${OWNER}/charts/hort-server:${VERSION}"
        env:
          OWNER: ${{ github.repository_owner }}

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY-PUBLISHED: fail fast if a tag-triggered run did not actually
  # publish the expected semver tags on ghcr.io.
  #
  # Background: issue #905 was filed because operators believed semver tags
  # (1.1.7, 1.1.8) were missing on ghcr.io. The reproduction used
  # `gh api .../packages/.../versions` without `--paginate`; that endpoint
  # returns at most 30 versions per page sorted by recency, and the page is
  # dominated by sha-prefixed dev/branch tags, so semver tags get pushed off
  # the visible window. The tags were in fact present.
  #
  # To make the publish contract self-evident, this job probes the registry
  # the same way consumers do (a HEAD on the manifest endpoint) and fails
  # the workflow if any expected semver tag is missing for the current ref.
  # That way we catch the real failure mode (a push that silently no-op'd)
  # in the publish workflow itself, not days later via a broken helm install.
  # ════════════════════════════════════════════════════════════════════════════
  verify-published:
    name: Verify Published Tags
    runs-on: ubuntu-latest
    permissions:
      packages: read
    needs: [merge, publish-chart]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Probe ghcr.io manifests for expected semver tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_IMAGE: ${{ env.SERVER_IMAGE }}
          WORKER_IMAGE: ${{ env.WORKER_IMAGE }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -u
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Verifying ghcr.io semver tags for version: ${VERSION}"

          # The OCI single-manifest accept type is required for the Helm chart
          # probe — `helm push` writes an `image.manifest.v1` artifact, not an
          # index/manifest-list. Harmless for the multi-arch image probes.
          MANIFEST_ACCEPT='-H Accept:application/vnd.oci.image.index.v1+json -H Accept:application/vnd.oci.image.manifest.v1+json -H Accept:application/vnd.docker.distribution.manifest.list.v2+json -H Accept:application/vnd.docker.distribution.manifest.v2+json'

          probe_ghcr() {
            local name="$1"; local tag="$2"
            local token
            token=$(curl -sf "https://ghcr.io/token?service=ghcr.io&scope=repository:${name}:pull" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              | jq -r '.token // empty')
            [ -n "${token}" ] || return 1
            # shellcheck disable=SC2086
            curl -sfL --proto =https -o /dev/null \
              -H "Authorization: Bearer ${token}" \
              ${MANIFEST_ACCEPT} \
              "https://ghcr.io/v2/${name}/manifests/${tag}"
          }

          # Everything this workflow promises to publish on a tag push: both
          # multi-arch images (mirror the metadata-action `tags:` blocks above)
          # and the Helm chart pushed by `publish-chart`.
          EXPECTED=(
            "${SERVER_IMAGE}:${VERSION}"
            "${WORKER_IMAGE}:${VERSION}"
            "${OWNER}/charts/hort-server:${VERSION}"
          )

          missing=()
          for entry in "${EXPECTED[@]}"; do
            name="${entry%:*}"
            tag="${entry#*:}"
            if probe_ghcr "${name}" "${tag}"; then
              echo "  ok  ghcr.io/${name}:${tag}"
            else
              echo "::error::ghcr.io/${name}:${tag} is missing"
              missing+=("ghcr.io/${name}:${tag}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Tag-triggered publish completed but some expected artifacts are not present on ghcr.io. Inspect the merge / publish-chart jobs for silent imagetools / helm-push failures."
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All expected ghcr.io artifacts present for ${VERSION}."

  summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [merge, publish-chart]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Published Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Helm Chart" >> $GITHUB_STEP_SUMMARY
          echo "- \`oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/hort-server\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Supply Chain Security" >> $GITHUB_STEP_SUMMARY
          echo "- All images signed with [cosign](https://docs.sigstore.dev/cosign/overview/) keyless signing (GitHub OIDC)" >> $GITHUB_STEP_SUMMARY
          echo "- Verify: \`cosign verify --certificate-oidc-issuer=https://token.actions.githubusercontent.com --certificate-identity-regexp='https://github.com/project-hort/.*' ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
