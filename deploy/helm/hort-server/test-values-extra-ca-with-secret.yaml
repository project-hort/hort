# extraCaBundle smoke fixture: path + secretName both set (Recipe B auto).
#
# Secret-backed auto-mount, symmetric with the configMapName path. The
# chart auto-mounts the Secret read-only at `path` on BOTH the server
# and the worker (and the always-on CronJobs) and wires HORT_EXTRA_CA_BUNDLE
# on the pods it mounted — exactly like Recipe A.
#
# Expected rendering:
#   - HORT_EXTRA_CA_BUNDLE env var present on BOTH server + worker
#   - volumeMounts + volumes entry for `extra-ca-bundle` on server,
#     worker, and the two always-on CronJobs (scrub, quarantineRelease-
#     Sweep), all referencing the SECRET (read-only 0444)
#   - NO checksum/extra-ca-bundle annotation (that is ConfigMap-only;
#     Secret updates propagate via Kubernetes' own mechanism)
publicBaseUrl: https://hort.example.com

auth:
  provider: oidc
  oidc:
    issuerUrl: https://idp.example.com/realms/hort
    audience: hort-server

postgres:
  app:
    existingSecret: hort-postgres-app
  admin:
    existingSecret: hort-postgres-admin

storage:
  backend: filesystem

ephemeralStore:
  backend: memory

extraCaBundle:
  path: /etc/hort-server/ca-bundle/ca.crt
  secretName: corporate-ca-bundle-secret
