{{/*
Service-account rotation CronJob.

Periodically invokes `hort-cli admin task invoke service-account-rotation`,
which hits the admin-task endpoint at
`POST /api/v1/admin/tasks/service-account-rotation`. The endpoint
enqueues a `kind='service-account-rotation'` row that the worker's
dispatcher hands to the `ServiceAccountRotationHandler`.

Architectural note: this CronJob is a *trigger* only. The actual k8s
API client that writes the managed Secrets lives in the worker pod via
the `KubernetesSecretWriterImpl` adapter. The CronJob pod itself does
NOT touch the Kubernetes API — it only calls the hort-server admin-task
HTTP endpoint with a service-account PAT. The per-namespace RBAC
therefore binds the *worker* SA, not the CronJob SA — see
`svc-rotation-rbac.yaml`.

Schedule-overlap protection: `concurrencyPolicy: Forbid` prevents the
controller from spawning a second pod while the previous tick is still
running. Execution-overlap protection lives in the worker's per-kind
semaphore (registered single-active concurrency for this kind).

Idempotency-Key: `hort-cli admin task invoke` is passed
`--idempotency-key-window=minute`, which computes the key as
`<UTC minute>:service-account-rotation` (matching the legacy shell shape
`date -u +%Y-%m-%dT%H:%M`). A controller-restart double-fire
short-circuits at the framework layer rather than producing two
redundant rotation passes.

Backlog 078 Item 9 (chart S4): `scheduledTasks.serviceAccountRotation.enabled`
(default false) is the SINGLE source-of-truth toggle for fallback PAT
rotation. The same flag that renders this CronJob ALSO drives the
worker-side wiring (the rotation env block in worker-deployment.yaml +
the per-namespace RBAC in svc-rotation-rbac.yaml) — there is no separate
`worker.rotation.enabled` switch any more. The parent
`scheduledTasks.adminTasksEnabled` master toggle must also be true for any
admin-task CronJob to render; `values.schema.json` requires it (and a
non-empty `worker.rotation.publicRegistryHost`) whenever this flag is on,
so a half-set config fails fast at `helm install` rather than silently
half-enabling rotation.

The service-account token (`{{ release }}-svc-token`) is mounted
from the k8s Secret written by the bootstrap Job
(svc-token-bootstrap-job.yaml).
*/}}
{{- if and .Values.scheduledTasks.adminTasksEnabled .Values.scheduledTasks.serviceAccountRotation.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "hort-server.fullname" . }}-service-account-rotation
  labels:
    {{- include "hort-server.labels" . | nindent 4 }}
    hort-server.io/job: service-account-rotation
spec:
  schedule: {{ .Values.scheduledTasks.serviceAccountRotation.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "hort-server.selectorLabels" . | nindent 12 }}
            hort-server.io/job: service-account-rotation
        spec:
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: hort-cli
              image: {{ include "hort-server.image" . | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              # The runtime image is distroless (no /bin/sh, no `date`).
              # `hort-cli` is shipped alongside `hort-server` in the same image
              # so the CronJob can invoke it directly; the idempotency key
              # is computed inside the CLI via `--idempotency-key-window`
              # instead of via a shell `date` invocation.
              command:
                - /usr/local/bin/hort-cli
              args:
                - admin
                - task
                - invoke
                - service-account-rotation
                - --idempotency-key-window
                - minute
              env:
                - name: HORT_SERVER
                  value: "http://{{ include "hort-server.fullname" . }}:{{ .Values.service.httpPort | default 8080 }}"
                - name: HORT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "hort-server.fullname" . }}-svc-token
                      key: token
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
{{- end }}
