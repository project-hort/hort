{{- if and .Values.worker .Values.worker.enabled .Values.worker.serviceAccount.create -}}
{{/*
ServiceAccount for the worker Deployment.

Distinct from the hort-server's serviceAccount
(`hort-server.serviceAccountName`) so operators can attach
worker-specific cloud IAM annotations (e.g.
`eks.amazonaws.com/role-arn` for the worker image puller, separate
from the server's S3 access role).

By default makes no Kubernetes API calls. The worker normally only
opens outbound TCP to Postgres + Redis + the scanner CLI subprocesses;
the SA exists for image-pull authentication and pod-level RBAC posture,
not API access.

Exception: when `scheduledTasks.serviceAccountRotation.enabled = true`
the worker pod becomes a k8s API client and writes managed Secrets into
the namespaces listed in `worker.rotation.targetNamespaces`. The
per-namespace RBAC binding the worker SA to a tightly-scoped Role in
each target namespace lives in `svc-rotation-rbac.yaml` — those Roles
are the *only* k8s API surface this SA exercises, and they render only
when rotation is opted in.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hort-server.worker.serviceAccountName" . }}
  labels:
    {{- include "hort-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.worker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
