{{/*
Service-account token bootstrap Job.

Runs as a Helm post-install / post-upgrade hook to mint the `hort_svc_*`
token that CronJob pods mount as a k8s Secret. Idempotent: if the token
already exists in the database (same name, same service-account user) the
`issue-svc-token` command exits 0 without rotation.

Two-container design (no Dockerfile change required):
  - init-container: `hort-server admin issue-svc-token --output=file:/run/bootstrap/token`
    Writes the plaintext token to a shared emptyDir volume (mode 0600).
    Uses the admin DSN (same Secret as the migrate Job) so it can INSERT
    into `users` and `api_tokens`.
  - main container: `bitnamilegacy/kubectl` (includes bash) reads the file and runs
    `kubectl create secret generic … --dry-run=client -o yaml | kubectl apply -f -`
    The idempotent apply pattern avoids conflicts on re-runs.

The bootstrap ServiceAccount (from svc-bootstrap-rbac.yaml) grants the
main container exactly the permissions needed to create/update the
`{{ release }}-svc-token` Secret in the release namespace.

Hook annotations:
  - post-install,post-upgrade  — runs after the Deployment is rolled out so
    the database is already migrated (pre-install migrate Job ran at weight -5).
  - hook-weight 5              — after the Deployment (weight 0) so the
    service-account row is available.
  - before-hook-creation       — clean up any prior failed run so the Job
    name does not collide on retry.

Image note: the hort-server runtime image is distroless (no shell, no kubectl).
The two-container pattern avoids polluting the main image with Kubernetes
tooling. `bitnamilegacy/kubectl` ships a static kubectl binary plus a minimal
bash shell — operators pin the minor version to their cluster's API
compatibility window via `scheduledTasks.svcTokenKubectlImage`. The default lives on
`docker.io/bitnamilegacy/*` because Bitnami's mid-2025 repackaging removed
older minor-version tags from `docker.io/bitnami/*` and rehomed them under
`bitnamilegacy/`. The image content (entrypoint, bash availability) is
preserved.
*/}}
{{- if .Values.scheduledTasks.adminTasksEnabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hort-server.fullname" . }}-svc-token-bootstrap
  labels:
    {{- include "hort-server.labels" . | nindent 4 }}
    hort-server.io/job: svc-token-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  # Auto-clean 5 minutes after the Job completes (success or failure).
  # The k8s audit log and operator tooling retain the run history;
  # the Job object itself is just "did it finish".
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "hort-server.selectorLabels" . | nindent 8 }}
        hort-server.io/job: svc-token-bootstrap
    spec:
      serviceAccountName: {{ include "hort-server.fullname" . }}-svc-bootstrap
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: bootstrap-token
          # medium: Memory keeps the plaintext off-disk. The volume
          # lifetime is the Pod lifetime — removed when the Job Pod completes.
          emptyDir:
            medium: Memory
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: issue-token
          image: {{ include "hort-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Write the plaintext token to the shared emptyDir.
          # --output=file:<path> creates the file with mode 0600.
          args:
            - admin
            - issue-svc-token
            - --name=cronjob-tasks
            - --permission=admin_task_invoke
            - --output=file:/run/bootstrap/token
            {{- if .Values.scheduledTasks.rotateSvcToken }}
            # F15 Option B (scheduledTasks.rotateSvcToken=true): operator
            # requested rotation. issue-svc-token revokes the existing
            # token + mints a new one + writes the plaintext to the
            # output file. write-secret then updates the cluster Secret
            # with the fresh value. Routine upgrades leave this off and
            # rely on the write-secret idempotent path (F15 Option A).
            - --rotate
            {{- end }}
          env:
            # Backlog 078 Item 5 — canonical HORT_DATABASE_URL (the binary
            # falls back to bare DATABASE_URL for sqlx-cli / Tier-2 / 12-factor).
            # Only the env-var NAME changed; the admin-secret reference is unchanged.
            - name: HORT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.admin.existingSecret | quote }}
                  key: {{ .Values.postgres.admin.secretKey | quote }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: bootstrap-token
              mountPath: /run/bootstrap
            - name: tmp
              mountPath: /tmp
      containers:
        - name: write-secret
          # bitnamilegacy/kubectl includes bash, making the idempotent apply
          # pipeline possible without a shell in the hort-server image.
          # Pin the minor version to the cluster's API compatibility window;
          # operators override via scheduledTasks.svcTokenKubectlImage. Default lives in
          # `bitnamilegacy/*` — see the docstring comment at the top of this
          # file for the Bitnami repackaging context.
          image: {{ .Values.scheduledTasks.svcTokenKubectlImage | default "bitnamilegacy/kubectl:1.30" | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              # F15 Option A — tolerate the idempotent issue-svc-token skip path.
              #
              # issue-svc-token exits 0 WITHOUT writing the output file when the
              # token row already exists in the database and --rotate was not
              # passed (admin.rs:282-294 — the plaintext is hashed in the DB and
              # cannot be re-emitted). On routine helm upgrades that's the
              # common case: the token was minted at first install, the Secret
              # was created at first install, and there is nothing to do.
              #
              # Without this branch, the post-upgrade hook fails on every
              # subsequent upgrade with "no such file or directory" — see F15.
              set -eu
              SECRET={{ include "hort-server.fullname" . }}-svc-token
              if [ ! -f /run/bootstrap/token ]; then
                if kubectl get secret "$SECRET" >/dev/null 2>&1; then
                  echo "info: token row exists in DB and Secret '$SECRET' exists in cluster; nothing to do"
                  exit 0
                fi
                echo "error: token row exists in DB but no token file was written AND Secret '$SECRET' does not exist in cluster" >&2
                echo "       The plaintext is lost (hashed in DB). Recover via:" >&2
                echo "         helm upgrade ... --set scheduledTasks.rotateSvcToken=true" >&2
                echo "       which forces issue-svc-token to revoke the old row + mint a new one." >&2
                exit 1
              fi
              kubectl create secret generic "$SECRET" \
                --from-file=token=/run/bootstrap/token \
                --dry-run=client -o yaml | kubectl apply -f -
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: bootstrap-token
              mountPath: /run/bootstrap
              readOnly: true
{{- end }}
