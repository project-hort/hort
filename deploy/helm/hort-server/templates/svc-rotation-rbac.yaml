{{/*
Per-namespace RBAC for the fallback PAT rotation reconciler.

Each entry in `worker.rotation.targetNamespaces` renders a `Role`
plus a `RoleBinding` in *that* target namespace. The binding's
`subjects[].namespace` points at the *release* namespace where
the worker pod and its ServiceAccount actually live — a standard
cross-namespace pattern for any controller-style workload that
reconciles objects outside its own namespace.

Design choice: per-namespace `Role`, not a single cluster-wide
`ClusterRole` + `ClusterRoleBinding`. The design doc deliberately
keeps authorization granular — every namespace the operator opts
into is an explicit YAML line in `worker.rotation.targetNamespaces`.
A ClusterRole would let the worker write Secrets in every namespace
once enabled, which is exactly the blast radius the per-namespace
shape exists to bound.

The `svc-bootstrap-rbac.yaml` template is the closest precedent — it
also locks down Secret-writing permission tightly, though for a
single in-namespace Secret. This template differs by looping over
multiple target namespaces and binding to the existing worker SA
instead of creating a dedicated bootstrap SA.

Required verbs (from the writer adapter):
- `get`, `list`: the `read_managed` path inspects existing Secrets
  to enforce the `project-hort.de/managed-by` collision-detection rule and
  to read the `project-hort.de/last-rotated` freshness label.
- `create`: the very first reconcile on a new Secret name.
- `update`: SSA ownership-transfer edge cases on some k8s versions.
- `patch`: the steady-state SSA path (`Patch::Apply`, chosen in
  Item 6 §4) requires `patch` verb authorization.

Empty `worker.rotation.targetNamespaces` renders zero Roles — the
rotation handler then logs `namespace_not_authorized` for every
SA whose `fallbackRotation.targetSecret.namespace` is unmatched
(documented behaviour in Item 7).

Backlog 078 Item 9 (chart S4): this template is gated on the SINGLE
rotation source-of-truth toggle `scheduledTasks.serviceAccountRotation.enabled`
(the same flag that gates the CronJob + the worker rotation env). The
pre-078 `worker.rotation.enabled` second switch was collapsed.
`worker.enabled` is still required because the RoleBinding binds the
worker ServiceAccount, which is meaningless without the worker
Deployment.
*/}}
{{- if and .Values.worker.enabled .Values.scheduledTasks.serviceAccountRotation.enabled .Values.worker.rotation.targetNamespaces }}
{{- range $ns := .Values.worker.rotation.targetNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hort-server.fullname" $ }}-rotation-{{ $ns }}
  namespace: {{ $ns }}
  labels:
    {{- include "hort-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: worker-rotation
rules:
  # Reading existing Secrets — freshness check + collision detection.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Writing the managed Secret. SSA via `Patch::Apply` needs `patch`;
  # the first apply on a new resource needs `create`. `update` covers
  # the SSA-ownership-transfer edge case some k8s versions exercise.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hort-server.fullname" $ }}-rotation-{{ $ns }}
  namespace: {{ $ns }}
  labels:
    {{- include "hort-server.labels" $ | nindent 4 }}
    app.kubernetes.io/component: worker-rotation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hort-server.fullname" $ }}-rotation-{{ $ns }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hort-server.worker.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
