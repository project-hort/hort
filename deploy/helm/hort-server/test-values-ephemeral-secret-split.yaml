# Ephemeral-store fixture: per-class Redis URLs supplied via K8s
# Secret indirection. Main `redis.url` set inline; per-class
# overrides reference Secrets via existingSecret + secretKey.
# Renders HORT_REDIS_URL inline + HORT_REDIS_URL_EVICTABLE and
# HORT_REDIS_URL_DURABLE via secretKeyRef.
publicBaseUrl: https://hort.example.com

auth:
  provider: oidc
  oidc:
    issuerUrl: https://idp.example.com/realms/hort
    audience: hort-server

postgres:
  app:
    existingSecret: hort-postgres-app
  admin:
    existingSecret: hort-postgres-admin

storage:
  backend: filesystem

ephemeralStore:
  backend: redis
  redis:
    url: "redis://main:pw@redis-main:6379/0"
    evictableExistingSecret: hort-redis-evictable
    evictableSecretKey: EVICTABLE_URL
    durableExistingSecret: hort-redis-durable
    durableSecretKey: DURABLE_URL
