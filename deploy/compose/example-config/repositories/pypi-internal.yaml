apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: pypi-internal
spec:
  name: "PyPI Internal"
  description: "Hosted PyPI for first-party Python packages"
  format: pypi
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/pypi-internal
  isPublic: false
  replicationPriority: local_only
