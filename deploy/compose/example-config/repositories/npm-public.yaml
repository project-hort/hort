apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: npm-public
spec:
  name: "npm Public Mirror"
  description: "Pull-through cache for the public npmjs.org registry"
  format: npm
  type: proxy
  # Serve never-ingested upstream versions in the index so clients can request
  # (and thereby pull-through-cache) any version. The default `released_only`
  # lists only already-ingested versions, so a fresh mirror's index is empty
  # and npm/pip cannot bootstrap a first install.
  indexMode: include_pending
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/npm-public
  proxy:
    upstreamUrl: "https://registry.npmjs.org"
    # NOTE: credentials and secretRef are not yet implemented. Anonymous
    # mirror only in v1.
  isPublic: true
  replicationPriority: immediate
