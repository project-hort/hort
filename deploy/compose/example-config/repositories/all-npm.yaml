apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: all-npm
spec:
  name: "All npm"
  description: "Virtual aggregator over npm-public (and any future npm-* members)"
  format: npm
  type: virtual
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/all-npm
  virtualMembers:
    - npm-public
  isPublic: true
  replicationPriority: on_demand
