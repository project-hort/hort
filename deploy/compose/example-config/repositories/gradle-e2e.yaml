apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  # Key matches the GRADLE_REPO_KEY env default in
  # scripts/native-tests/scenarios/clients/maven.sh (Gradle `maven-publish` →
  # `.module` GMM + POM marker, then a Gradle resolve). Declared `format:
  # gradle` to prove the Maven handler serves the Gradle alias
  # (RepositoryFormat::Gradle → MavenFormatHandler, one wire protocol, §9).
  name: gradle-e2e
spec:
  name: "Gradle E2E"
  description: "Hosted Gradle (format alias of Maven) repo used by scripts/native-tests/scenarios/clients/maven.sh — proves .module GMM opaque pass-through and the Gradle=Maven alias."
  format: gradle
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/gradle-e2e
  isPublic: true
  replicationPriority: local_only
