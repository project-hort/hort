apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: oci-e2e
spec:
  name: "OCI E2E"
  description: "Hosted OCI repo used by scripts/native-tests/scenarios/clients/oci.sh"
  format: oci
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/oci-e2e
  isPublic: true
  replicationPriority: local_only
