apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: cargo-e2e
spec:
  name: "Cargo E2E"
  description: "Hosted Cargo repo used by scripts/native-tests/scenarios/clients/cargo.sh"
  format: cargo
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/cargo-e2e
  isPublic: true
  replicationPriority: local_only
