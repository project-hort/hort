apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: oci-quarantine-e2e
spec:
  name: "OCI Quarantine E2E"
  description: "Hosted OCI repo under a quarantining ScanPolicy; used by scripts/native-tests/scenarios/clients/oci-push-under-quarantine.sh to prove a write-authorized push-dedup blob HEAD is not 503'd by the quarantine gate."
  format: oci
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/oci-quarantine-e2e
  isPublic: true
  replicationPriority: local_only
