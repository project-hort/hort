apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  # Key matches the OCI_MIRROR_REPO env override in
  # scripts/native-tests/run.sh --hort=compose (the harness scopes the repo per E2E run
  # so it doesn't collide with parallel suites).
  name: oci-mirror-e2e
spec:
  name: "OCI mirror smoke"
  description: "Hosted OCI repo with two upstream mappings configured by scripts/native-tests/scenarios/proxy/oci-mirror.sh"
  format: oci
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/oci-mirror-e2e
  isPublic: true
  replicationPriority: local_only
