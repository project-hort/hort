apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: pypi-public
spec:
  name: "PyPI Public Mirror"
  description: "Pull-through cache for the public pypi.org index; public proxy member of pypi-virt-e2e (ADR 0031); scripts/native-tests/scenarios/clients/pypi-virtual.sh"
  format: pypi
  type: proxy
  # Serve never-ingested upstream versions in the simple index so clients can
  # request (and thereby pull-through-cache) any version. The default
  # `released_only` lists only already-ingested versions, so a fresh mirror's
  # index is empty and pip cannot bootstrap a first install. Mirrors
  # npm-public.yaml.
  indexMode: include_pending
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/pypi-public
  proxy:
    # Required by the gitops validator for type=proxy. The standalone
    # UpstreamMapping at upstreams/pypi-public.yaml is what populates the
    # repository_upstream_mappings row try_upstream_file_pull's
    # UpstreamResolver actually reads (the field here is validator-only).
    upstreamUrl: "https://pypi.org"
  isPublic: true
  replicationPriority: immediate
