apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  # Key matches the PYPI_REPO_KEY env default in
  # scripts/native-tests/scenarios/upstream/pypi-upstream-tampered.sh. Distinct from
  # the happy-path repo so both can run in the same harness without
  # colliding on the (repository_id, path_prefix=NULL) row in
  # repository_upstream_mappings.
  name: pypi-upstream-tampered-e2e
spec:
  name: "PyPI upstream tampering smoke (checksum mismatch, failure path)"
  description: "Proxy PyPI repo used by scripts/native-tests/scenarios/upstream/pypi-upstream-tampered.sh; upstream is the wiremock-pypi-tampered sidecar serving JSON metadata advertising the real upstream sha256 alongside tampered wheel/sdist body bytes."
  format: pypi
  type: proxy
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/pypi-upstream-tampered-e2e
  proxy:
    # Required by the gitops validator for type=proxy. The standalone
    # UpstreamMapping at deploy/compose/example-config/upstreams/
    # pypi-upstream-tampered-e2e.yaml is what try_upstream_file_pull
    # actually resolves through.
    upstreamUrl: "http://wiremock-pypi-tampered:8080"
  isPublic: true
  replicationPriority: local_only
