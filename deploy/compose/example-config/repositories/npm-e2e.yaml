apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: npm-e2e
spec:
  name: "npm E2E"
  description: "Hosted npm repo used by scripts/native-tests/scenarios/clients/npm.sh"
  format: npm
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/npm-e2e
  isPublic: true
  replicationPriority: local_only
