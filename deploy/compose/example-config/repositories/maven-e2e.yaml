apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  # Key matches the MAVEN_REPO_KEY env default in
  # scripts/native-tests/scenarios/clients/maven.sh (hosted release + SNAPSHOT
  # legs: `mvn deploy` then `mvn dependency:get`).
  name: maven-e2e
spec:
  name: "Maven E2E"
  description: "Hosted Maven repo used by scripts/native-tests/scenarios/clients/maven.sh (mvn deploy / dependency:get + Gradle maven-publish/resolve)."
  format: maven
  type: hosted
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/maven-e2e
  isPublic: true
  replicationPriority: local_only
