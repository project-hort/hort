# PermissionGrant: [developer, ci-pusher] -> write pypi-internal
# (dev-user twine upload to the private member,
# scripts/native-tests/scenarios/clients/pypi-virtual.sh). Per-repo + two-claim
# subject passes the allowlist linter. Rationale: see ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-write-pypi-internal
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: write
  repository: pypi-internal
