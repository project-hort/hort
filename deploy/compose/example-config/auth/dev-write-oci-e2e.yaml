# PermissionGrant: [developer, ci-pusher] -> write oci-e2e
# (dev-user skopeo push via --dest-creds, scenarios/clients/oci.sh).
# Per-repo + two-claim subject passes the allowlist linter. Rationale:
# see ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-write-oci-e2e
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: write
  repository: oci-e2e
