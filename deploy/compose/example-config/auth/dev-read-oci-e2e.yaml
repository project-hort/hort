# PermissionGrant: [developer, ci-pusher] -> read oci-e2e
# (dev-user skopeo pull-back via --src-creds, scenarios/clients/oci.sh —
# the OCI round-trip authenticates the pull as dev-user, unlike the
# anonymous pypi/cargo/npm pulls). Rationale: see ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-read-oci-e2e
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: read
  repository: oci-e2e
