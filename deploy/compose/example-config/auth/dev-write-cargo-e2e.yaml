# PermissionGrant: [developer, ci-pusher] -> write cargo-e2e
# (dev-user `cargo publish`, scenarios/clients/cargo.sh). Per-repo + two-claim
# subject passes the allowlist linter. Rationale: see ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-write-cargo-e2e
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: write
  repository: cargo-e2e
