# PermissionGrant: a caller with BOTH `developer` AND `ci-pusher` claims may
# write `gradle-e2e` (the Gradle-format alias repo). Satisfies the dev-user
# `gradle publish` in scripts/native-tests/scenarios/clients/maven.sh, which
# authenticates via auth-catalog Entry 8 (Gradle PasswordCredentials → HTTP
# Basic, password = the minted registry token). Per-repo scoped + two-claim
# subject both required to pass the allowlist linter. Rationale: see
# ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-write-gradle-e2e
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: write
  repository: gradle-e2e
