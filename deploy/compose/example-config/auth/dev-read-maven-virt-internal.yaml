# PermissionGrant: [developer, ci-pusher] -> read maven-virt-internal
# The private member is resolved through maven-virt-e2e with the SAME caller
# (ADR 0031 / ADR 0021 auth composition), so the dev needs explicit Read on the
# member to resolve it through the virtual — Write does NOT imply Read.
# scripts/native-tests/scenarios/clients/maven-virtual.sh. Rationale: see
# ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-read-maven-virt-internal
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: read
  repository: maven-virt-internal
