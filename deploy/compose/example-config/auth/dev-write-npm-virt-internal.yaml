# PermissionGrant: [developer, ci-pusher] -> write npm-virt-internal
# (dev-user `npm publish` to the private member, scripts/native-tests/
# scenarios/clients/virtual.sh). Per-repo + two-claim subject passes the
# allowlist linter. Rationale: see ci-pushers.yaml.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: dev-write-npm-virt-internal
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: write
  repository: npm-virt-internal
