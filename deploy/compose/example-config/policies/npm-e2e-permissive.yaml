apiVersion: project-hort.de/v1beta1
kind: ScanPolicy
metadata:
  name: npm-e2e-permissive
spec:
  # Per-repo operator opt-out of quarantine-by-default. See
  # `pypi-e2e-permissive.yaml` for the full rationale — the npm native
  # test (`scripts/native-tests/scenarios/clients/npm.sh`) follows the same
  # publish-then-immediately-install pattern.
  scope:
    repository: npm-e2e
  severityThreshold: critical
  quarantineDuration: 0s
  requireApproval: false
  # Provenance off for permissive e2e (no per-ingest verify job).
  provenanceMode: off
  scanBackends: []
  licensePolicy: {}
