apiVersion: project-hort.de/v1beta1
kind: UpstreamMapping
metadata:
  # UpstreamMapping for the `repository_upstream_mappings` row that
  # crates/hort-http-cargo/src/upstream_pull.rs::try_upstream_crate_pull
  # resolves via UpstreamResolver. Cargo uses a registry-wide upstream
  # per repo (no path-prefix routing), mirroring PyPI's catch-all
  # mapping rather than OCI's multi-namespace split.
  name: cargo-upstream-e2e
spec:
  repository: cargo-upstream-e2e
  # Empty pathPrefix → catch-all single-upstream mapping. The Cargo
  # orchestrator passes "" as the prefix on every resolve() call.
  pathPrefix: ""
  # Wiremock service hostname inside the v2 compose network. Serves
  # the sparse-index `config.json` + per-crate NDJSON; the artifact
  # leg follows the absolute URL composed from `config.json.dl`
  # (pre-rewritten to point at this same host in the wiremock fixture).
  upstreamUrl: http://wiremock-cargo-upstream:8080
  # Explicit opt-in to a plaintext upstream. The wiremock sidecar runs
  # HTTP-only inside the compose network; production upstreams MUST be
  # https and this flag MUST be omitted. Every fetch through this
  # mapping emits a WARN line and ticks
  # hort_upstream_insecure_total{format="cargo", reason="scheme_http"}.
  insecureUpstreamUrl: true
  auth:
    type: anonymous
