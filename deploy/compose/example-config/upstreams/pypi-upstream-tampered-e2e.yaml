apiVersion: project-hort.de/v1beta1
kind: UpstreamMapping
metadata:
  # Tampered-bytes companion to pypi-upstream-e2e. Different upstream
  # URL (wiremock-pypi-tampered) so the two scenarios stay fully
  # isolated; the JSON body the tampered wiremock serves still
  # advertises the real upstream sha256 — only the wheel/sdist body
  # bytes are altered, which is exactly the supply-chain-attack surface
  # the verification gate exists to catch.
  name: pypi-upstream-tampered-e2e
spec:
  repository: pypi-upstream-tampered-e2e
  pathPrefix: ""
  upstreamUrl: http://wiremock-pypi-tampered:8080
  # Explicit opt-in for the plaintext tampered-bytes wiremock fixture.
  # Same posture as the happy-path mapping: dev/e2e only, never
  # production.
  insecureUpstreamUrl: true
  auth:
    type: anonymous
