apiVersion: project-hort.de/v1beta1
kind: UpstreamMapping
metadata:
  # Tampered-bytes companion to npm-upstream-e2e. Different upstream
  # URL (wiremock-npm-tampered) so the two scenarios stay fully
  # isolated; the packument the tampered wiremock serves still
  # advertises the real `dist.integrity` SRI — only the .tgz body
  # bytes are altered, which is exactly the supply-chain-attack surface
  # the SHA-512 verification gate exists to catch.
  name: npm-upstream-tampered-e2e
spec:
  repository: npm-upstream-tampered-e2e
  pathPrefix: ""
  upstreamUrl: http://wiremock-npm-tampered:8080
  # Explicit opt-in for the plaintext tampered-bytes wiremock fixture.
  # Same posture as the happy-path mapping: dev/e2e only, never
  # production.
  insecureUpstreamUrl: true
  auth:
    type: anonymous
