# Federation e2e overlay — layered on top of docker-compose.yml.
#
#   docker compose -f deploy/compose/docker-compose.yml \
#                   -f deploy/compose/docker-compose.federation.yml up -d
#
# Driven exclusively by scripts/host-tests/test-gitops-machine-identity.sh,
# which generates every host-side path this file interpolates (TLS material,
# Ed25519 signing key, the gitops config tree with the OidcIssuer +
# ServiceAccount envelopes) into a per-run scratch dir and exports the
# HORT_FED_* vars before invoking compose.
#
# Why an overlay and not edits to docker-compose.yml: the base stack is the
# shared dev/smoke surface for every other native test. Token-exchange has
# hard companion requirements (native tokens + an Ed25519 signing key +
# HORT_OIDC_CLI_CLIENT_ID + a trusted HTTPS issuer) that would change the
# boot contract for unrelated smokes. Keeping it as a sibling overlay means
# the federation smoke owns the reconfigured stack and nothing else pays
# the cost.
#
# The `:-` defaults keep `docker compose ... config|down` parseable even
# when the HORT_FED_* vars are unset (e.g. `--clean` teardown path); they are
# never the values used for a real run — the test always exports concrete
# paths first.

services:
  fed-issuer:
    # A real OIDC issuer from hort-server's perspective: OIDC discovery +
    # JWKS served over TLS, reachable in-network at the exact host that
    # the minted JWTs carry as `iss` (https://fed-issuer:8443). The server
    # hard-rejects a plaintext issuerUrl, so this must be HTTPS and
    # hort-server must trust the CA via HORT_EXTRA_CA_BUNDLE (no insecure
    # knob exists — all outbound TLS clients share the same trust-bundle
    # convention).
    image: nginx:alpine
    container_name: hort-fed-issuer
    restart: unless-stopped
    volumes:
      - ${HORT_FED_ISSUER_WEBROOT:-/dev/null}:/srv/issuer:ro
      - ${HORT_FED_ISSUER_NGINX_CONF:-/dev/null}:/etc/nginx/conf.d/default.conf:ro
      - ${HORT_FED_ISSUER_TLS_CRT:-/dev/null}:/etc/nginx/tls/issuer.crt:ro
      - ${HORT_FED_ISSUER_TLS_KEY:-/dev/null}:/etc/nginx/tls/issuer.key:ro

  hort-server:
    depends_on:
      # Inherit the base deps (postgres / keycloak-ready / migrate /
      # cas-init); add the issuer. service_started is sufficient — the
      # apply-time JWKS warm-up is best-effort (apply succeeds even if
      # JWKS is unreachable; the runtime federation path fetches lazily
      # on the first exchange), and the test gates issuer readiness
      # explicitly before it exchanges.
      fed-issuer:
        condition: service_started
    environment:
      # Mount the route + its hard companion requirements (config.rs
      # boot-fails when token-exchange is enabled without native tokens
      # and an Ed25519 signing key).
      HORT_TOKEN_EXCHANGE_ENABLED: "true"
      HORT_NATIVE_TOKENS_ENABLED: "true"
      # Only consumed to render /.well-known/hort-client-config; any
      # non-empty value satisfies the boot gate (federation does not
      # use the cli client id).
      HORT_OIDC_CLI_CLIENT_ID: "hort-cli"
      HORT_OCI_TOKEN_SIGNING_KEY_FILE: "/etc/hort/sign/signing-key.pem"
      HORT_EXTRA_CA_BUNDLE: "/etc/hort/ca/issuer-ca.pem"
    volumes:
      # Full re-declaration (last-file-wins on the /etc/hort/config target,
      # additive for the rest). The base mounts ./example-config:ro; the
      # test seeds a per-run copy plus the OidcIssuer + ServiceAccount
      # envelopes and points the mount here. hort-server only reads the
      # tree, so :ro is correct — "writable" in the spec meant the host
      # being able to seed it per run, which a scratch dir is.
      - cas:/var/lib/hort-server/cas
      - ${HORT_FED_CONFIG_DIR:-/dev/null}:/etc/hort/config:ro
      - ${HORT_FED_SIGNING_KEY:-/dev/null}:/etc/hort/sign/signing-key.pem:ro
      - ${HORT_FED_CA_BUNDLE:-/dev/null}:/etc/hort/ca/issuer-ca.pem:ro
