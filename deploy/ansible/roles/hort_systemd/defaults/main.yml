---
# Defaults for the hort-systemd role.

# CAS filesystem path on the host (hort-server and hort-worker write here).
hort_systemd_cas_dir: /var/lib/hort/cas

# systemd env-file directory (mode 0600, owned by hort user).
hort_systemd_env_dir: /etc/hort

# hort-server binary PATH (installed by hort-binaries role).
hort_systemd_server_bin: /usr/local/bin/hort-server

# hort-worker binary PATH (installed by hort-binaries role).
hort_systemd_worker_bin: /usr/local/bin/hort-worker

# Scanner binary paths used by the worker.
hort_systemd_trivy_bin: /usr/local/bin/trivy
hort_systemd_osv_bin: /usr/local/bin/osv-scanner

# Pinned scanner versions.
# Override in host_vars or group_vars when a newer version is validated.
#
# hort_systemd_osv_version: pinned to a known-good release tag (without "v").
# Verify against https://github.com/google/osv-scanner/releases
hort_systemd_osv_version: "1.9.1"
#
# trivy is installed UNPINNED from the aquasecurity apt repo: that repo's
# "generic" suite is rolling-latest-only (it serves a single version), so a
# version pin cannot hold. Integrity is via the signed-by keyring; latest is
# the right posture for a vuln scanner. (No hort_systemd_trivy_version var.)

# ── osv-scanner SLSA provenance verification ──────────────────────────────────
# slsa-verifier is used to verify the SLSA provenance attestation
# (osv-scanner_<version>_linux_amd64.intoto.jsonl) shipped by google/osv-scanner
# releases.  This mirrors the fail-closed ethos of the hort_binaries cosign gate:
# the provenance check runs before install, and the play fails if it does not pass.
#
# Pinned slsa-verifier version and per-arch SHA-256 checksums.
# Verify at https://github.com/slsa-framework/slsa-verifier/releases
# When upgrading, update the version and both checksums together.
hort_systemd_slsa_verifier_version: "2.7.0"
hort_systemd_slsa_verifier_sha256_amd64: "REPLACE_WITH_SHA256_FROM_RELEASE_PAGE"
hort_systemd_slsa_verifier_sha256_arm64: "REPLACE_WITH_SHA256_FROM_RELEASE_PAGE"
# ACTION REQUIRED: replace the sentinel values above with the real SHA-256
# checksums before deploying.  See README "Obtaining binary checksums" for
# the step-by-step runbook.  Obtain the values from:
#   https://github.com/slsa-framework/slsa-verifier/releases/tag/v2.7.0
#   (file: slsa-verifier-linux-amd64  /  slsa-verifier-linux-arm64)
# Run: sha256sum slsa-verifier-linux-amd64  to confirm locally.
# Store the verified values in host_vars/ or group_vars/production/ (vault),
# NOT in this committed defaults file.

# SLSA source URI for osv-scanner provenance verification.
# Must match the GitHub repo that built the release.
hort_systemd_osv_slsa_source_uri: "github.com/google/osv-scanner"
