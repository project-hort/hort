---
# hort role — Quadlet container units, env-files, CAS volume, migrate ordering.
#
# Depends on the podman role having already created the hort service user,
# the Quadlet directory, and the hort_config_dir.
#
# Secrets arrive via Ansible Vault in group_vars/production/ and are written
# to env-files on the host (mode 0600, owned by the hort user).  They never
# appear in this role's task list.

# ── Directories ──────────────────────────────────────────────────────────────

- name: Ensure env-file directory exists
  ansible.builtin.file:
    path: "{{ hort_env_dir }}"
    state: directory
    owner: root
    group: "{{ hort_user }}"
    mode: "0750"

- name: Ensure postgres data directory exists
  ansible.builtin.file:
    path: "{{ hort_postgres_data_dir }}"
    state: directory
    owner: "{{ hort_uid }}"
    group: "{{ hort_gid }}"
    mode: "0700"

# ── OCI token signing key (Ed25519) ──────────────────────────────────────────
# HORT_NATIVE_TOKENS_ENABLED=true requires an OCI /v2 bearer-token signing key
# (hort-server refuses to boot otherwise — the same gap the native flavor hit).
# Generate an Ed25519 PKCS#8 key on the host ONCE (creates: guard — regenerating
# invalidates already-issued OCI tokens). Owned by the container uid + mounted
# :U,ro so the rootless container can read it but not rewrite its own secret.
- name: Ensure OCI key directory exists
  ansible.builtin.file:
    path: "{{ hort_oci_key_dir }}"
    state: directory
    owner: "{{ hort_uid }}"
    group: "{{ hort_gid }}"
    mode: "0700"

- name: Generate OCI token signing key (Ed25519 PKCS#8 PEM, once)
  ansible.builtin.command:
    cmd: openssl genpkey -algorithm ed25519 -out {{ hort_oci_key_dir }}/oci-signing.pem
    creates: "{{ hort_oci_key_dir }}/oci-signing.pem"

- name: Own the OCI signing key as the container uid
  ansible.builtin.file:
    path: "{{ hort_oci_key_dir }}/oci-signing.pem"
    owner: "{{ hort_uid }}"
    group: "{{ hort_gid }}"
    mode: "0600"

# ── env-files (non-secret subset) ────────────────────────────────────────────
# Secret values injected here from group_vars/production/ (gitignored Vault).
# Each template has a "SECRET PLACEHOLDER" comment explaining where to source
# the value.
#
# mode 0640 root:hort — root owns the file so the container process (running as
# hort) cannot rewrite its own secrets; the hort group can read so the rootless
# systemd session that launches the container picks up the env-file correctly.

- name: Write hort-server env-file
  ansible.builtin.template:
    src: hort-server.env.j2
    dest: "{{ hort_env_dir }}/hort-server.env"
    owner: root
    group: "{{ hort_user }}"
    mode: "0640"
  notify: Reload hort-server

- name: Write hort-worker env-file
  ansible.builtin.template:
    src: hort-worker.env.j2
    dest: "{{ hort_env_dir }}/hort-worker.env"
    owner: root
    group: "{{ hort_user }}"
    mode: "0640"
  notify: Reload hort-worker

# ── Quadlet unit files ────────────────────────────────────────────────────────

- name: Install hort.network Quadlet unit
  ansible.builtin.template:
    src: hort.network.j2
    dest: "{{ hort_quadlet_dir }}/hort.network"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Install cas.volume Quadlet unit
  ansible.builtin.template:
    src: cas.volume.j2
    dest: "{{ hort_quadlet_dir }}/hort-cas.volume"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Install postgres.container Quadlet unit
  ansible.builtin.template:
    src: postgres.container.j2
    dest: "{{ hort_quadlet_dir }}/postgres.container"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Install hort-migrate.container Quadlet unit
  ansible.builtin.template:
    src: hort-migrate.container.j2
    dest: "{{ hort_quadlet_dir }}/hort-migrate.container"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Install hort-server.container Quadlet unit
  ansible.builtin.template:
    src: hort-server.container.j2
    dest: "{{ hort_quadlet_dir }}/hort-server.container"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Install hort-worker.container Quadlet unit
  ansible.builtin.template:
    src: hort-worker.container.j2
    dest: "{{ hort_quadlet_dir }}/hort-worker.container"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  notify: Reload systemd user daemon

# ── Dex IdP sidecar (optional) ────────────────────────────────────────────────
# Rendered + started only when hort_dex_enabled. The hort-server env-file
# switches HORT_AUTH_PROVIDER=oidc + HORT_OIDC_ISSUER_URL=<Dex> in the same
# condition (see hort-server.env.j2).

- name: Ensure Dex config directory exists
  ansible.builtin.file:
    path: "{{ hort_dex_config_dir }}"
    state: directory
    owner: "{{ hort_uid }}"
    group: "{{ hort_gid }}"
    mode: "0750"
  when: hort_dex_enabled | bool

- name: Render Dex config
  ansible.builtin.template:
    src: dex-config.yaml.j2
    dest: "{{ hort_dex_config_dir }}/config.yaml"
    owner: "{{ hort_uid }}"
    group: "{{ hort_gid }}"
    mode: "0640"
  when: hort_dex_enabled | bool
  notify: Reload systemd user daemon

- name: Install dex.container Quadlet unit
  ansible.builtin.template:
    src: dex.container.j2
    dest: "{{ hort_quadlet_dir }}/dex.container"
    owner: "{{ hort_user }}"
    group: "{{ hort_user }}"
    mode: "0644"
  when: hort_dex_enabled | bool
  notify: Reload systemd user daemon

- name: Remove dex.container Quadlet unit when Dex is disabled
  ansible.builtin.file:
    path: "{{ hort_quadlet_dir }}/dex.container"
    state: absent
  when: not (hort_dex_enabled | bool)
  notify: Reload systemd user daemon

# ── Flush handlers before enabling units ─────────────────────────────────────
# daemon-reload must complete before systemctl enable --now so that systemd
# sees the freshly generated unit files.

- name: Flush handlers (reload systemd before enable)
  ansible.builtin.meta: flush_handlers

# ── Enable and start units ────────────────────────────────────────────────────
# postgres and hort-server are long-running services. hort-migrate is
# Type=oneshot + RemainAfterExit: once it has run it stays active(exited), so the
# Requires=/After= dep on hort-server will NOT re-trigger it. It is restarted
# explicitly below (after postgres, before hort-server) so every deploy re-applies
# newly-added migrations — otherwise the schema would trail a new binary and
# hort-server's boot assert_current would refuse to serve.

- name: Enable and start postgres container
  ansible.builtin.systemd:
    name: postgres
    state: started
    enabled: true
    scope: user
  become: true
  become_user: "{{ hort_user }}"

# Dex must be up before hort-server so the OIDC discovery / JWKS fetch at boot
# succeeds when HORT_AUTH_PROVIDER=oidc points at Dex.
- name: Enable and start dex container
  ansible.builtin.systemd:
    name: dex
    state: started
    enabled: true
    scope: user
  become: true
  become_user: "{{ hort_user }}"
  when: hort_dex_enabled | bool

- name: Run hort-migrate container (oneshot restart — re-applies migrations each deploy, blocks until complete)
  ansible.builtin.systemd:
    name: hort-migrate.service
    state: restarted
    scope: user
  become: true
  become_user: "{{ hort_user }}"

- name: Enable and start hort-server container
  ansible.builtin.systemd:
    name: hort-server
    state: started
    enabled: true
    scope: user
  become: true
  become_user: "{{ hort_user }}"

- name: Enable and start hort-worker container
  ansible.builtin.systemd:
    name: hort-worker
    state: started
    enabled: true
    scope: user
  become: true
  become_user: "{{ hort_user }}"
