---
- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ hort_user }}"

- name: Reload hort-server
  ansible.builtin.systemd:
    name: hort-server
    state: restarted
    scope: user
  become: true
  become_user: "{{ hort_user }}"

- name: Reload hort-worker
  ansible.builtin.systemd:
    name: hort-worker
    state: restarted
    scope: user
  become: true
  become_user: "{{ hort_user }}"
