---
# Defaults for the hort role.  All values can be overridden in group_vars/,
# host_vars/, or --extra-vars.
#
# Secret values (DATABASE_URL, hort_svc_* tokens) must live only in the
# gitignored group_vars/production/ tree — never in defaults.

# Quadlet unit directory for the rootless hort service user.
hort_quadlet_dir: /var/lib/hort/.config/containers/systemd

# env-file directory (also under the hort user's home, mode 0600).
hort_env_dir: /var/lib/hort/.config/hort

# Postgres container data volume host path.
hort_postgres_data_dir: /var/lib/hort/postgres-data

# OCI token signing key (Ed25519 PKCS#8 PEM). HORT_NATIVE_TOKENS_ENABLED=true
# requires an OCI /v2 bearer-token signing key — hort-server refuses to boot
# without one (the same gap the native flavor hit). Generated on the host and
# bind-mounted read-only into the hort-server container.
hort_oci_key_dir: /var/lib/hort/keys
hort_oci_signing_key_container_path: /etc/hort/keys/oci-signing.pem
