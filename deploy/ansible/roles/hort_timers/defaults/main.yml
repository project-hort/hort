---
# hort_timers — systemd timer+oneshot pairs that drive the worker's periodic
# task kinds on the native (non-k8s) deploy, mirroring the Helm scheduledTasks.
# Two execution paths:
#   - dsn-direct: `hort-server <subcommand>` — a DB-only subcommand
#     (MinimalConfig, ADR 0009) that enqueues a job via the DSN; the running
#     hort-worker processes it. No token, no API.
#   - admin-task: `hort-cli admin task invoke <kind>` — enqueues via the API
#     with an `admin_task_invoke` token. Needs hort-cli + the cronjob-tasks
#     token on the host.

hort_timers_enabled: true

# Master gate for the admin-task path (needs hort-cli + the cronjob-tasks
# token). dsn-direct timers run regardless of this flag.
hort_timers_admin_tasks_enabled: true

hort_timers_server_bin: /usr/local/bin/hort-server
hort_timers_cli_bin: /usr/local/bin/hort-cli
hort_timers_server_env_file: /etc/hort/hort-server.env
hort_timers_token_file: /etc/hort/tasks-token
hort_timers_server_url: "https://{{ registry_fqdn }}"
hort_timers_run_user: "{{ hort_user }}"

# Per-task schedule (systemd OnCalendar) + enable. Cadences mirror the Helm
# scheduledTasks defaults; `path` selects the execution path.
hort_timers_tasks:
  # ── enabled — dsn-direct (hort-server subcommand; no token) ──────────────────
  - kind: quarantine-release-sweep
    path: dsn-direct
    exec_subcommand: enqueue-quarantine-release-sweep
    on_calendar: "*:0/5"             # every 5 min (Helm: */5 * * * *)
    enabled: true
    description: "Release artifacts whose quarantine window has elapsed (CRITICAL — without it quarantine never releases)."
  - kind: config-scrub
    path: dsn-direct
    exec_subcommand: scrub
    on_calendar: "*-*-* 03:00:00"    # daily 03:00 (Helm: 0 3 * * *)
    enabled: true
    description: "Scrub the gitops config snapshot / CAS integrity."
  # ── enabled — admin-task (hort-cli; needs the cronjob-tasks token) ───────────
  - kind: scanner-registry-prune
    path: admin-task
    idempotency_window: hour
    on_calendar: "*:00"              # hourly (Helm: 0 * * * *)
    enabled: true
    description: "Prune stale scanner-registry rows."
  - kind: staging-sweep
    path: admin-task
    idempotency_window: minute
    on_calendar: "*:0/15"            # every 15 min (Helm: */15 * * * *)
    enabled: true
    description: "Sweep orphaned stateful-upload staging entries (else they grow until ingest fails on a full FS)."
  - kind: replay-seen-prune
    path: admin-task
    idempotency_window: hour
    on_calendar: "*:00"              # hourly (Helm: 0 * * * *)
    enabled: true
    description: "Prune the federation JWT-replay seen-set."
  - kind: cron-rescan-tick
    path: admin-task
    idempotency_window: minute
    on_calendar: "*:0/5"             # every 5 min (Helm: */5 * * * *)
    enabled: true
    description: "Re-scan cached artifacts against newly-published advisories (continuous supply-chain re-evaluation)."
  - kind: advisory-watch-tick
    path: admin-task
    idempotency_window: hour
    on_calendar: "0/6:00"            # every 6h (Helm: 0 */6 * * *)
    enabled: true
    description: "Pull the OSV advisory diff and re-scan artifacts hit by newly-published advisories (keeps OSV data current)."
  # ── disabled — need extra infrastructure (non-destructive) ──────────────────
  - kind: verify-event-chain
    path: dsn-direct
    exec_subcommand: verify-event-chain
    on_calendar: "*-*-* 02:30:00"    # daily (Helm: 0 2 * * *)
    enabled: false
    description: "Offline event-chain tamper-evidence + anchoring; needs eventstore-checkpoint + an S3 Object-Lock bucket (off on the filesystem flavor)."
  - kind: eventstore-checkpoint
    path: admin-task
    idempotency_window: hour
    on_calendar: "*:00"              # hourly (Helm: 0 * * * *)
    enabled: false
    description: "Emit the signed event-chain checkpoint anchor verify-event-chain attests; needs an S3 Object-Lock (WORM) bucket."
  - kind: prefetch-tick
    path: dsn-direct
    exec_subcommand: enqueue-prefetch-tick
    on_calendar: "*:0/15"            # every 15 min (Helm: */15 * * * *)
    enabled: false
    description: "Walk prefetch-eligible repos + tracked packages and enqueue upstream-divergence prefetch jobs."
  - kind: prefetch-row-retention-sweep
    path: dsn-direct
    exec_subcommand: enqueue-prefetch-row-retention-sweep
    on_calendar: "*-*-* 02:00:00"    # daily 02:00 (Helm: 0 2 * * *)
    enabled: false
    description: "Delete terminal prefetch job rows older than the retention horizon."
  - kind: wheel-metadata-backfill
    path: dsn-direct
    exec_subcommand: enqueue-wheel-metadata-backfill
    on_calendar: "Sun *-*-* 04:00:00"  # weekly Sun 04:00 (Helm: 0 4 * * 0)
    enabled: false
    description: "One-shot retrofit: extract PEP 658 METADATA for PyPI wheels ingested before metadata extraction existed."
  - kind: service-account-rotation
    path: admin-task
    idempotency_window: minute
    on_calendar: "*:0/15"            # every 15 min (Helm: */15 * * * *)
    enabled: false
    description: "Rotate service-account tokens (needs the k8s svc-token rotation surface; off on the native flavor)."
  # ── disabled — destructive retention/archive tasks ──────────────────────────
  # Require the task:destructive claim (ADR 0038), which the non-admin
  # cronjob-tasks SA cannot hold, plus HORT_RETENTION_DATABASE_URL — so they
  # cannot run unattended.
  - kind: retention-evaluate
    path: admin-task
    idempotency_window: hour
    on_calendar: "*-*-* 03:00:00"
    enabled: false
    description: "Retention evaluation — needs HORT_RETENTION_DATABASE_URL wired (else fail-safe no-op)."
  - kind: retention-purge
    path: admin-task
    idempotency_window: hour
    on_calendar: "*-*-* 04:00:00"
    enabled: false
    description: "Retention purge — needs HORT_RETENTION_DATABASE_URL wired."
  - kind: eventstore-archive
    path: admin-task
    idempotency_window: day
    on_calendar: "Sun *-*-* 05:00:00"
    enabled: false
    description: "Event-store archive — needs HORT_RETENTION_DATABASE_URL + the seal-pool single-flight backstop (ADR 0020)."
