---
- name: Reload sshd
  ansible.builtin.service:
    name: sshd
    state: reloaded

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart journald
  ansible.builtin.service:
    name: systemd-journald
    state: restarted

- name: Reload auditd rules
  ansible.builtin.service:
    name: auditd
    state: restarted

- name: Reload AppArmor profiles
  ansible.builtin.service:
    name: apparmor
    state: reloaded
