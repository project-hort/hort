---
# hort-binaries role — fetch, verify, and install hort-server and hort-worker
# release binaries.
#
# Provenance gate (load-bearing):
#   1. Download the .tar.gz + .sha256 + .bundle from the GitHub release.
#   2. Verify the sha256 checksum (integrity).
#   3. cosign verify-blob with --certificate-identity-regexp and
#      --certificate-oidc-issuer pinned (provenance).  Verifying signed-by-
#      anyone is NOT enough; the identity pin is the security control.
# The play fails on any verification failure — there is no fallback path.
#
# Signature artifact form (confirmed from .github/workflows/build-binaries.yml):
#   cosign sign-blob --yes --bundle <name>.tar.gz.bundle <name>.tar.gz
# Verification: cosign verify-blob --bundle <name>.tar.gz.bundle ...

# ── Prerequisites ─────────────────────────────────────────────────────────────
# cosign is the trust-bootstrap for the provenance gate.  An unpinned apt cosign
# risks flag-semantics drift (bundle format requires cosign >= v2) and cannot
# verify its own provenance.  We therefore install a specific release binary from
# the sigstore GitHub release page, verified by SHA-256 checksum, then assert
# cosign version >= 2 before running the verify-blob gate (M5).
#
# Pinned version and checksums are in defaults/main.yml
# (hort_binaries_cosign_version / hort_binaries_cosign_sha256_amd64|arm64).
# IMPORTANT: update those SHA-256 values from the official release page when
# upgrading cosign.

- name: Download pinned cosign binary (amd64)
  ansible.builtin.get_url:
    url: >-
      https://github.com/sigstore/cosign/releases/download/v{{ hort_binaries_cosign_version }}/cosign-linux-amd64
    dest: /var/tmp/cosign-install
    mode: "0600"
    force: true
  when: hort_arch == 'amd64'

- name: Download pinned cosign binary (arm64)
  ansible.builtin.get_url:
    url: >-
      https://github.com/sigstore/cosign/releases/download/v{{ hort_binaries_cosign_version }}/cosign-linux-arm64
    dest: /var/tmp/cosign-install
    mode: "0600"
    force: true
  when: hort_arch == 'arm64'

- name: Compute checksum of downloaded cosign binary
  ansible.builtin.stat:
    path: /var/tmp/cosign-install
    checksum_algorithm: sha256
    get_checksum: true
  register: hort_binaries_cosign_stat

- name: Fail if cosign checksum does not match (amd64)
  ansible.builtin.fail:
    msg: >-
      cosign checksum mismatch for v{{ hort_binaries_cosign_version }} (amd64):
      expected {{ hort_binaries_cosign_sha256_amd64 }},
      got {{ hort_binaries_cosign_stat.stat.checksum }}.
      Update hort_binaries_cosign_sha256_amd64 in defaults/main.yml.
  when:
    - hort_arch == 'amd64'
    - hort_binaries_cosign_stat.stat.checksum != hort_binaries_cosign_sha256_amd64

- name: Fail if cosign checksum does not match (arm64)
  ansible.builtin.fail:
    msg: >-
      cosign checksum mismatch for v{{ hort_binaries_cosign_version }} (arm64):
      expected {{ hort_binaries_cosign_sha256_arm64 }},
      got {{ hort_binaries_cosign_stat.stat.checksum }}.
      Update hort_binaries_cosign_sha256_arm64 in defaults/main.yml.
  when:
    - hort_arch == 'arm64'
    - hort_binaries_cosign_stat.stat.checksum != hort_binaries_cosign_sha256_arm64

- name: Install pinned cosign binary to /usr/local/bin
  ansible.builtin.copy:
    src: /var/tmp/cosign-install
    dest: /usr/local/bin/cosign
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Assert cosign version >= 2 (bundle-format verify-blob requires cosign v2+)
  # Fail-closed: if cosign is older than v2, verify-blob --bundle semantics
  # differ and the provenance gate cannot be trusted.  This guard fires before
  # any verify-blob call so a version regression is caught immediately.
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      cosign version 2>&1 | grep -oP '(?<=GitVersion:\s{1,16}v)\d+' | head -1
    executable: /bin/bash
  register: hort_binaries_cosign_major_version
  changed_when: false
  failed_when: hort_binaries_cosign_major_version.stdout | int < 2

- name: Ensure download temp directory exists
  ansible.builtin.file:
    path: "{{ hort_binaries_tmp_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# ── Download + verify each binary ────────────────────────────────────────────

- name: Download, verify, and install hort-server and hort-worker
  ansible.builtin.include_tasks: install_binary.yml
  loop:
    - hort-server
    - hort-worker
  loop_control:
    loop_var: hort_binaries_bin
