---
# Defaults for the hort-binaries role.
#
# hort_version is set in group_vars/all.yml (currently "0.9.3-beta.2").
# Override here if you need to pin a different version for this role specifically.
# Must be a published v* tag on github.com/project-hort/hort.
#
# Signature artifact form: cosign sign-blob writes a self-contained Sigstore
# bundle (--bundle, cosign v3+).  Each release asset ships:
#   hort-<bin>-linux-<arch>.tar.gz
#   hort-<bin>-linux-<arch>.tar.gz.sha256
#   hort-<bin>-linux-<arch>.tar.gz.bundle   ← Sigstore bundle (sig + cert + chain)
#
# verify: cosign verify-blob --bundle <file>.bundle \
#           --certificate-identity-regexp <regexp> \
#           --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#           <file>.tar.gz

# GitHub release download base URL (no trailing slash).
# hort_arch (amd64|arm64) is set in group_vars/all.yml — override per-host.
hort_binaries_github_release_url: >-
  https://github.com/project-hort/hort/releases/download/v{{ hort_version }}

# Cosign identity pin — the regexp must match the Actions workflow ref that
# signed the release.  Pinning to refs/tags/v* ensures only a tag-triggered
# release workflow identity is accepted; a branch or PR build is rejected.
hort_binaries_cosign_cert_identity_regexp: >-
  ^https://github\.com/project-hort/hort/\.github/workflows/build-binaries\.yml@refs/tags/v

# Cosign OIDC issuer — GitHub Actions keyless signing always uses this issuer.
hort_binaries_cosign_cert_oidc_issuer: https://token.actions.githubusercontent.com

# Directory where binaries are installed.
hort_binaries_install_dir: /usr/local/bin

# Temporary download directory on the target host.
hort_binaries_tmp_dir: /var/tmp/hort-binaries

# ── Pinned cosign installation (M5) ──────────────────────────────────────────
# cosign is the trust-bootstrap tool for the provenance gate: an unpinned apt
# cosign carries two risks:
#   1. Flag-semantics drift — a new apt cosign major version may change
#      verify-blob flag semantics (the bundle format requires cosign >= v2).
#   2. Trust-bootstrap: apt transport cannot verify cosign's own provenance the
#      way cosign can verify hort's binaries.
#
# Fix: install a specific cosign release binary from the sigstore GitHub release
# page, verified by its published SHA-256 checksum, then assert the installed
# version is >= 2 before running the verify-blob gate.
#
# Pinned cosign version and per-arch SHA-256 checksums.
# Verify at https://github.com/sigstore/cosign/releases
# When upgrading, update the version and both checksums together.
hort_binaries_cosign_version: "2.4.3"
hort_binaries_cosign_sha256_amd64: "6ba32e532c497e9c9c21d4d8bc0c7a62e0df42c0dfda9b5f517d92191da02849"
hort_binaries_cosign_sha256_arm64: "ffa74b6e0e68f9e3aa63ff200db8e4e1f9b90e8048f1c0d35c98e0e43d0de9e8"
# NOTE: The SHA-256 values above are TEMPLATE PLACEHOLDERS.  Before deploying,
# replace them with the real values from:
#   https://github.com/sigstore/cosign/releases/tag/v2.4.3
#   (files: cosign-linux-amd64  /  cosign-linux-arm64)
# Run: sha256sum cosign-linux-amd64  to confirm locally.
