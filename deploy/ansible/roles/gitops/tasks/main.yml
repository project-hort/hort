---
# gitops role — place the gitops config tree + (re)start hort-server + mint
# operator service-account tokens.
#
# Boot-time apply: hort-server reads the gitops tree on startup via
# gitops_boot.rs (ApplyConfigUseCase::apply).  The way to trigger a re-apply
# is to restart the server — there is NO `admin bootstrap` subcommand and NO
# `apply` CLI.  The apply-time linter is the audited validation gate.
#
# APPLY-BEFORE-MINT SEQUENCING:
#   `issue-svc-token` requires a pre-existing gitops ServiceAccount of the
#   same name (a non-admin svc-token has no standing privilege of its own —
#   its authority comes from the SA's gitops grants). So the gitops tree (which
#   declares the maintainer-dev / maintainer-curator SAs + their standalone
#   serviceAccount-subject PermissionGrants under auth/) must be synced AND
#   applied (server restart -> boot apply) BEFORE the token-mint tasks run.
#   The task ordering below enforces this: sync tree -> flush_handlers
#   (restart -> boot apply) -> issue-svc-token. Do NOT reorder the mint tasks
#   above the `flush_handlers` step.
#
#   These tokens are non-admin: `issue-svc-token` rejects `--permission=admin`.
#   Human admin is OIDC (Dex) -> CliSession, not a static SA token — see the
#   Dex sidecar (roles/hort, hort_dex_enabled) + auth/admins.yaml
#   (hort-admins -> admin ClaimMapping).
#
# Token minting:
#   maintainer-dev     — read permission  → /run/secrets/hort-dev.token
#   maintainer-curator — curate permission → /run/secrets/hort-curator.token
#
#   Both tokens are idempotent (exit 0, no reissue) unless --rotate is passed.
#   Tokens must be stored in Ansible Vault / the maintainer's secret store after
#   minting — they are NEVER committed to the repo.
#
# Flavor-aware invocation:
#   gitops_admin_cmd is set by the caller:
#     native:  "hort-server admin"
#     podman:  "podman exec hort-server hort-server admin"
#
# Required variables:
#   hort_config_dir   — host path where hort-server reads its gitops config
#   gitops_admin_cmd    — prefix for admin subcommands (see defaults/main.yml)
#   hort_user         — service user that owns hort_config_dir

- name: Assert gitops_admin_cmd is configured
  ansible.builtin.assert:
    that:
      - gitops_admin_cmd | length > 0
    fail_msg: >-
      gitops_admin_cmd must be set (e.g. "hort-server admin" for native flavor
      or "podman exec hort-server hort-server admin" for Podman flavor).

# ── Placeholder guard (M8) ────────────────────────────────────────────────────
# Scan the gitops SOURCE tree (gitops_source_dir, defaults to files/gitops/ in
# the Ansible repo) for residual placeholder tokens before syncing to the host.
# If any are found the play aborts with a clear message pointing the operator at
# the substitution step.
#
# What is checked:
#   REPLACE_ME   — literal marker used in example service-account fixtures
#                  (e.g. gitlab-ci.yaml.example project_path: "REPLACE_ME/hort")
#   <...>        — angle-bracket style markers (e.g. <YOUR_VALUE>)
#
# Why scan the SOURCE tree, not the destination:
#   The destination tree is written by this role — if placeholders are in the
#   source they will be in the destination after sync.  Scanning source before
#   sync gives an early, actionable failure rather than silently deploying a
#   broken config that fails only at hort-server boot.
#
# *.example files are excluded from the scan — they are committed operator
# templates that legitimately contain REPLACE_ME markers.  The operator copies
# the .example to a real YAML file and substitutes the value; the guard then
# catches any un-substituted copy.  See README "Customising the gitops tree".
#
# The scan path is parameterised via gitops_source_dir (set in defaults/main.yml).
# Override in host_vars/group_vars if your operator tree lives elsewhere.

- name: Scan gitops source tree for residual placeholder tokens
  ansible.builtin.find:
    paths: "{{ gitops_source_dir }}"
    patterns: "*.yaml,*.yml,*.json,*.toml"
    excludes: "*.example"
    recurse: true
    file_type: file
  register: gitops_tree_files
  # The gitops SOURCE tree lives in the Ansible repo on the control node, not on
  # the managed host — scan it there. become:false so we read it as the local
  # user (no sudo prompt on the control node from the play-level become:true).
  delegate_to: localhost
  become: false

- name: Check each gitops file for placeholder tokens
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      grep -nE 'REPLACE_ME|<[A-Z_][A-Z0-9_]*>' "{{ gitops_item.path }}" || true
    executable: /bin/bash
  loop: "{{ gitops_tree_files.files }}"
  loop_control:
    loop_var: gitops_item
    label: "{{ gitops_item.path | basename }}"
  register: gitops_placeholder_hits
  changed_when: false
  delegate_to: localhost
  become: false

- name: Collect files that still contain placeholder tokens
  ansible.builtin.set_fact:
    gitops_placeholder_files: >-
      {{
        gitops_placeholder_hits.results
        | selectattr('stdout', 'ne', '')
        | map(attribute='gitops_item')
        | map(attribute='path')
        | list
      }}

- name: Fail if any gitops file contains residual placeholder tokens
  ansible.builtin.fail:
    msg: >-
      Residual placeholder tokens found in the gitops tree — the play is aborted
      to prevent deploying an incomplete configuration.

      Files with placeholders:
      {% for gitops_path in gitops_placeholder_files %}
        - {{ gitops_path }}
      {% endfor %}

      Action required: substitute all REPLACE_ME / <...> markers with real
      values before running this play.  See the README "Customising the gitops
      tree" section for per-file instructions (e.g. copy
      auth/service-accounts/gitlab-ci.yaml.example →
      auth/service-accounts/gitlab-ci.yaml and set the project_path value).
  when: gitops_placeholder_files | length > 0

# ── Config tree ───────────────────────────────────────────────────────────────

- name: Ensure hort config directory exists
  ansible.builtin.file:
    path: "{{ hort_config_dir }}"
    state: directory
    owner: root
    group: "{{ hort_user }}"
    mode: "0750"

# The synchronize module needs rsync on BOTH ends; a minimal Debian image ships
# none on the managed host. Install it before the sync.
- name: Ensure rsync is installed (required by the synchronize module)
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: true

# Synchronise the gitops tree.  The `delete: true` flag removes stale files
# so the host tree always matches the committed Ansible repo state exactly.
# *.example files are excluded: they are operator templates, not live config.
- name: Sync gitops config tree to host
  ansible.posix.synchronize:
    src: "{{ gitops_source_dir }}/"
    dest: "{{ hort_config_dir }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--chown=root:{{ hort_user }}"
      - "--chmod=D750,F640"
      - "--exclude=*.example"
  notify:
    - Restart hort-server (system scope)
    - Restart hort-server (user scope)

# ── Boot-time apply (restart → ApplyConfigUseCase::apply) ─────────────────────

- name: Flush handlers (restart hort-server to trigger boot-time apply)
  ansible.builtin.meta: flush_handlers

# Apply-before-mint gate: the boot apply runs to completion BEFORE hort-server
# binds its API listener (it reads every *.yaml under HORT_CONFIG_DIR first),
# so a reachable listener is the signal that the maintainer-dev /
# maintainer-curator ServiceAccounts exist in the DB. `issue-svc-token`
# requires that pre-existing SA — minting before the listener is up races the
# apply and fails with "service account not found". Wait for the local API high
# port before any mint task runs.
- name: Wait for hort-server boot apply to complete (API listener reachable)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ hort_api_port }}"
    delay: 2
    timeout: 120

# ── Operator service-account tokens ──────────────────────────────────────────
# Mint tokens for the two operator service accounts.  Both invocations are
# idempotent: if the named token already exists the command exits 0 without
# rotation.  Pass --rotate to replace an existing token.
#
# These tokens are non-admin (read / curate). `issue-svc-token` rejects
# `--permission=admin` and requires the matching gitops SA to already exist
# (declared under files/gitops/auth/service-accounts/, applied above).
#
# Tokens are written to /run/secrets/ (tmpfs, cleared on reboot) and must be
# retrieved from there and stored in Ansible Vault / the operator's secret
# store immediately after provisioning.

- name: Ensure /run/secrets directory exists
  ansible.builtin.file:
    path: /run/secrets
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Issue maintainer-dev service-account token (read permission)
  ansible.builtin.command:
    cmd: >-
      {{ gitops_admin_cmd }} issue-svc-token
      --name maintainer-dev
      --permission read
      --output file:/run/secrets/hort-dev.token
  environment: "{{ gitops_admin_env }}"
  changed_when: true
  # Note: idempotency is enforced by hort-server itself (exit 0, no reissue
  # if the token already exists).  changed_when: true is intentional — we
  # cannot distinguish "already existed" from "freshly issued" without parsing
  # stderr, and the conservative choice is to always report changed so
  # operators know a provisioning run touched the token slot.

- name: Issue maintainer-curator service-account token (curate permission)
  ansible.builtin.command:
    cmd: >-
      {{ gitops_admin_cmd }} issue-svc-token
      --name maintainer-curator
      --permission curate
      --output file:/run/secrets/hort-curator.token
  environment: "{{ gitops_admin_env }}"
  changed_when: true
