---
# postgres_apt role — install PostgreSQL via Debian apt, provision the hort
# database and ADR 0009 roles (hort_admin DDL + hort_app_role runtime DML),
# and harden pg_hba.conf to local-only scram-sha-256.
#
# Role names mirror the hort Helm chart model exactly (postgres-roles.md):
#   hort_admin    — LOGIN, CREATEROLE; owns public schema; used by hort-migrate.
#   hort_app_role — LOGIN, no CREATEROLE/CREATEDB; DML only; used by hort-server
#                   and hort-worker.
#   hort_retention_role — NOLOGIN; created by migration 004_events.sql (NOT here).
#
# IMPORTANT: do NOT add GRANT … ON ALL TABLES … TO hort_app_role anywhere in
# this role.  That bulk grant lands on the append-only `events` table and
# re-grants UPDATE/DELETE, breaking the audit invariant — PgEventStore::new()
# then refuses to boot (postgres-roles.md "Run this recipe against a fresh
# database only").  The only grants this role sets are the DEFAULT PRIVILEGES
# that forward from hort_admin to hort_app_role for future objects.
#
# Debian 13 ships PostgreSQL 17; hort requires >= PG 16.  PG 17 satisfies it.
# The role is idempotent: psql DO $$ blocks guard against duplicate creation.
# Uses ansible.builtin.command + psql to avoid a community.postgresql
# collection dependency that may not be installed on the control node.

# ── Install PostgreSQL ────────────────────────────────────────────────────────

- name: Install PostgreSQL package
  ansible.builtin.apt:
    name: postgresql
    state: present
    update_cache: true

- name: Ensure PostgreSQL service is started and enabled
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

# ── DDL/migrate role (hort_admin) ─────────────────────────────────────────────
# hort_admin needs CREATEROLE: migration 004_events.sql issues
# `CREATE ROLE hort_retention_role NOLOGIN` (inside a pg_roles-guarded DO block).
# Without CREATEROLE the migrate job aborts with "permission denied to create role".
#
# The password is fed to psql via stdin (the shell `stdin:` param) rather than
# the -c flag so that it never appears on the process argv and is therefore not
# visible in /proc/<pid>/cmdline or ps output.  psql reads from stdin when
# invoked with -f - (filename "-" means standard input).

- name: Create DDL/migrate role hort_admin (idempotent, CREATEROLE)
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -f
      - "-"
    stdin: |
      DO $$ BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '{{ postgres_apt_ddl_role }}') THEN
          CREATE ROLE {{ postgres_apt_ddl_role }}
            WITH LOGIN CREATEROLE NOSUPERUSER NOCREATEDB
            PASSWORD '{{ hort_db_ddl_password }}';
        ELSE
          ALTER ROLE {{ postgres_apt_ddl_role }}
            WITH LOGIN CREATEROLE
            PASSWORD '{{ hort_db_ddl_password }}';
        END IF;
      END $$;
  become: true
  become_user: postgres
  changed_when: true
  no_log: true

# ── Runtime role (hort_app_role) ──────────────────────────────────────────────
# hort_app_role must NOT hold CREATEROLE or CREATEDB (runtime never creates
# roles; only the migrate path does).

- name: Create runtime DML role hort_app_role (idempotent, no CREATEROLE)
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -f
      - "-"
    stdin: |
      DO $$ BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '{{ postgres_apt_runtime_role }}') THEN
          CREATE ROLE {{ postgres_apt_runtime_role }}
            WITH LOGIN NOSUPERUSER NOCREATEROLE NOCREATEDB
            PASSWORD '{{ hort_db_runtime_password }}';
        ELSE
          ALTER ROLE {{ postgres_apt_runtime_role }}
            WITH LOGIN NOSUPERUSER NOCREATEROLE NOCREATEDB
            PASSWORD '{{ hort_db_runtime_password }}';
        END IF;
      END $$;
  become: true
  become_user: postgres
  changed_when: true
  no_log: true

# ── Database ──────────────────────────────────────────────────────────────────

- name: Check if hort database exists
  ansible.builtin.command:
    argv:
      - psql
      - -tAc
      - SELECT 1 FROM pg_database WHERE datname = '{{ postgres_apt_db_name }}'
  become: true
  become_user: postgres
  changed_when: false
  register: postgres_apt_db_exists

- name: Create hort database with hort_admin as owner
  ansible.builtin.command:
    argv:
      - createdb
      - --owner={{ postgres_apt_ddl_role }}
      - --encoding=UTF8
      - --lc-collate=C
      - --lc-ctype=C
      - --template=template0
      - "{{ postgres_apt_db_name }}"
  become: true
  become_user: postgres
  when: postgres_apt_db_exists.stdout.strip() != "1"
  changed_when: true

# ── Schema ownership + privilege revocation ───────────────────────────────────
# Mirror the canonical recipe from postgres-roles.md exactly:
#
#   ALTER SCHEMA public OWNER TO hort_admin;       — DDL role owns schema
#   REVOKE CREATE ON SCHEMA public FROM PUBLIC;    — runtime cannot create tables
#   GRANT  USAGE  ON SCHEMA public TO hort_app_role;
#
# GRANT / REVOKE are idempotent no-ops when the privilege state already matches.
# We use changed_when: true conservatively (see the task comment in the original
# grants block: raw psql output has no "already set" signal we can parse reliably).

- name: Set public schema owner to hort_admin
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - "{{ postgres_apt_db_name }}"
      - -c
      - "ALTER SCHEMA public OWNER TO {{ postgres_apt_ddl_role }};"
  become: true
  become_user: postgres
  changed_when: true

- name: Revoke CREATE on public schema from PUBLIC (runtime cannot create tables)
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - "{{ postgres_apt_db_name }}"
      - -c
      - "REVOKE CREATE ON SCHEMA public FROM PUBLIC;"
  become: true
  become_user: postgres
  changed_when: true

- name: Grant USAGE on public schema to runtime role
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - "{{ postgres_apt_db_name }}"
      - -c
      - "GRANT USAGE ON SCHEMA public TO {{ postgres_apt_runtime_role }};"
  become: true
  become_user: postgres
  changed_when: true

# ── Default privileges for future objects ─────────────────────────────────────
# ALTER DEFAULT PRIVILEGES applies only to objects hort_admin creates AFTER this
# point.  It does NOT touch existing objects — which is correct for a fresh DB
# (there are none yet) and safe on a re-run (idempotent: re-running ALTER DEFAULT
# PRIVILEGES for a role+schema combination that already has the privilege is a
# no-op in Postgres).
#
# DO NOT add GRANT … ON ALL TABLES … here.  See the "IMPORTANT" comment at the
# top of this file.

- name: Set default privileges — future tables (hort_admin creates, hort_app_role gets DML)
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - "{{ postgres_apt_db_name }}"
      - -c
      - >-
        ALTER DEFAULT PRIVILEGES FOR ROLE {{ postgres_apt_ddl_role }}
          IN SCHEMA public
          GRANT SELECT, INSERT, UPDATE, DELETE
          ON TABLES TO {{ postgres_apt_runtime_role }};
  become: true
  become_user: postgres
  changed_when: true

- name: Set default privileges — future sequences (USAGE + SELECT + UPDATE)
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - "{{ postgres_apt_db_name }}"
      - -c
      - >-
        ALTER DEFAULT PRIVILEGES FOR ROLE {{ postgres_apt_ddl_role }}
          IN SCHEMA public
          GRANT USAGE, SELECT, UPDATE
          ON SEQUENCES TO {{ postgres_apt_runtime_role }};
  become: true
  become_user: postgres
  changed_when: true

# ── Harden pg_hba.conf ────────────────────────────────────────────────────────
# Replace the default pg_hba.conf with our hardened template.
# Reload (not restart) is sufficient for hba changes.

- name: Deploy hardened pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_apt_hba_conf }}"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Reload PostgreSQL

# ── Performance tuning drop-in ────────────────────────────────────────────────
# Deploy a conf.d drop-in with RAM-scaled performance settings.
# shared_buffers and max_wal_size require a full restart (not just reload);
# the handler below issues a restart, which also covers any reload-only params.
# The drop-in is applied AFTER the cluster is confirmed running (task above).

- name: Deploy performance tuning conf.d drop-in
  ansible.builtin.template:
    src: 10-hort-tuning.conf.j2
    dest: "{{ postgres_apt_conf_dir }}/10-hort-tuning.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  notify: Restart PostgreSQL

# ── Apply pending PostgreSQL config before dependent roles connect ────────────
# The pg_hba reload (scram-sha-256) and the tuning restart are notified above but
# would otherwise flush only at end-of-play — AFTER hort-migrate (hort_systemd
# role) connects as the scram-auth'd hort_admin role over the socket. Without this
# flush, the Debian-default `local all all peer` is still active at migrate time
# and the migrate fails with "Peer authentication failed for user hort_admin".
# Flushing here makes the hardened pg_hba live before any later role connects.
- name: Apply pending PostgreSQL config (pg_hba + tuning) before dependents connect
  ansible.builtin.meta: flush_handlers
