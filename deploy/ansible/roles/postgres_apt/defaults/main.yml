---
# Defaults for the postgres-apt role.
#
# Debian 13 (Trixie) ships PostgreSQL 17 via the main apt repository.
# Hort's minimum Postgres major is 16 (CI runs PG 16); PG 17 satisfies it.
# The Debian package name is `postgresql` (which pulls the version-specific
# meta-package, e.g. postgresql-17 on Debian 13).

# Postgres cluster / database
postgres_apt_db_name: artifact_registry

# Runtime role — least-privilege DML only (SELECT/INSERT/UPDATE/DELETE).
# This is the DSN that hort-server (serve path) and hort-worker use.
# Must match the hardcoded role name in the hort migrations (hort_app_role).
postgres_apt_runtime_role: hort_app_role

# DDL/migrate role — owns the database/schema, holds CREATEROLE so that
# migration 004_events.sql can issue `CREATE ROLE hort_retention_role NOLOGIN`.
# Used exclusively by hort-migrate (Type=oneshot) before hort-server starts.
# Must match the hardcoded role name in the hort migrations (hort_admin).
postgres_apt_ddl_role: hort_admin

# Retention role — NOLOGIN; created by migration 004_events.sql (NOT this role).
# Defined here so the hort_systemd post-migrate grant task can reference it
# without hardcoding.  Do NOT create this role in this role's tasks — leave it
# to the migration.
postgres_apt_retention_role: hort_retention_role

# pg_hba.conf path for the Debian-packaged cluster (version-independent symlink).
postgres_apt_hba_conf: /etc/postgresql/17/main/pg_hba.conf

# conf.d drop-in directory — Debian's postgresql.conf already has
# include_dir = 'conf.d', so any .conf file here is picked up automatically.
# Mirrors the PG major version (17) hardcoded above in postgres_apt_hba_conf.
postgres_apt_conf_dir: /etc/postgresql/17/main/conf.d
