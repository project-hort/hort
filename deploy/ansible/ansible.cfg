[defaults]
inventory = inventory/example/hosts.ini
roles_path = roles
# Use a fixed retry file path so stray .retry files don't litter the work tree.
retry_files_enabled = False
# Human-readable output that survives narrow terminals. The old `yaml` stdout
# callback lived in community.general and was REMOVED in v12.0.0; the built-in
# replacement is the default callback with result_format=yaml (ansible-core 2.13+).
stdout_callback = default
result_format = yaml
# Do not gather facts automatically; each play opts in with `gather_facts: true`
# to keep the role graph explicit.
gathering = explicit

[ssh_connection]
pipelining = True
