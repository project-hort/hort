---
# Podman flavor — rootless Podman + Quadlet units.
#
# Role execution order:
#   base          — OS hardening: firewall (ufw), sysctl, SSH hardening,
#                   unattended-upgrades, zram compressed-RAM swap,
#                   auditd baseline, persistent journald, nginx AppArmor enforce
#   podman        — rootless Podman runtime + service user + linger
#   hort          — Quadlet units: migrate, server, worker, postgres
#   nginx         — TLS-terminating reverse proxy (127.0.0.1:8080 → 443)
#   certbot       — Let's Encrypt certificate issuance + renewal
#   fail2ban      — brute-force protection
#   gitops        — syncs files/gitops/ tree to hort_config_dir on the host

- name: Deploy hort (Podman flavor)
  hosts: hort
  become: true
  gather_facts: true

  vars:
    # Flavor-specific vars consumed by the shared gitops role.
    # hort-server runs as a rootless Quadlet unit under the hort user's
    # systemd session, so admin commands go through `podman exec`.
    gitops_admin_cmd: "podman exec hort-server hort-server admin"
    gitops_server_systemd_scope: "user"

  roles:
    - role: base
    - role: podman
    - role: hort
    - role: nginx
    - role: certbot
    - role: fail2ban
    - role: gitops
