---
# Non-secret defaults shared by both Podman and native flavors.
# Secret values (DB password, svc-tokens, Vault'd) MUST live in the gitignored
# group_vars/production/ tree — never here.

# Public FQDN served by nginx (TLS-terminating reverse proxy).
registry_fqdn: registry.hort.rs

# Container images — override per-host or in group_vars/production/.
hort_server_image: ghcr.io/project-hort/hort-server:latest
hort_worker_image: ghcr.io/project-hort/hort-worker:latest
postgres_image: postgres:15

# hort_version is used by the native flavor (Task 9) to pin the downloaded
# release binary.  The Podman flavor uses OCI image tags above instead.
hort_version: "0.9.3-beta.2"

# Target CPU architecture for native binary downloads (hort_binaries role).
# Matches the system architecture: amd64 for x86-64 hosts, arm64 for aarch64.
hort_arch: amd64

# Rootless Podman service user created by the podman role.
hort_user: hort
hort_uid: 65532
hort_gid: 65532

# CAS (content-addressable storage) filesystem path inside the container.
# Matches HORT_STORAGE_FILESYSTEM_PATH in compose + the Dockerfiles.
hort_cas_container_path: /var/lib/hort-server/cas

# Gitops config directory mounted into hort-server (read-only).
# Populated by the gitops role (Task 4) from files/gitops/.
hort_config_dir: /etc/hort/config

# Port hort-server listens on inside the container; nginx proxies to
# 127.0.0.1:{{ hort_api_port }} on the host.
hort_api_port: 8080

# Metrics listener port (internal; NOT exposed to the internet).
hort_metrics_port: 9090

# ── PostgreSQL performance tuning ─────────────────────────────────────────────
# Values are scaled from ansible_memtotal_mb (a gathered fact; both playbooks
# have gather_facts: true).  They are intentionally CONSERVATIVE because
# Postgres co-locates with hort-server, hort-worker, and the Trivy/OSV scanners
# on a single VPS — Postgres does not own the box.
#
# Co-location sizing rationale:
#   shared_buffers     12.5% RAM  (not the 25% solo-server recommendation)
#   effective_cache    45%  RAM   (OS page-cache estimate for the planner)
#   work_mem           floor(RAM/512, 8) MB — kept low: per-sort-node × per-conn
#   maintenance_work_mem  min(5% RAM, 256 MB) — single autovac/index-build cap
#
# Workload notes:
#   - append-heavy event store + JSONB payloads → wal_compression on
#   - high-churn jwt_replay_seen/jobs tables → autovacuum_*_scale_factor 0.05
#   - SSD storage → random_page_cost 1.1, effective_io_concurrency 200
#
# Target values on a 4 GB box:
#   shared_buffers 512 MB, effective_cache_size ~1843 MB, work_mem 8 MB,
#   maintenance_work_mem 204 MB
# Target values on an 8 GB box:
#   shared_buffers 1024 MB, effective_cache_size ~3686 MB, work_mem 16 MB,
#   maintenance_work_mem 256 MB (capped)
#
# Override any of these in group_vars/production/ or host_vars/ if needed.

pg_shared_buffers_mb: "{{ (ansible_memtotal_mb * 0.125) | int }}"
pg_effective_cache_size_mb: "{{ (ansible_memtotal_mb * 0.45) | int }}"
pg_work_mem_mb: "{{ [(ansible_memtotal_mb // 512), 8] | max }}"
pg_maintenance_work_mem_mb: "{{ [(ansible_memtotal_mb * 0.05) | int, 256] | min }}"
pg_max_wal_size: "2GB"
pg_random_page_cost: "1.1"
pg_effective_io_concurrency: 200
pg_wal_compression: "on"
pg_checkpoint_completion_target: "0.9"
pg_autovacuum_vacuum_scale_factor: "0.05"
pg_autovacuum_analyze_scale_factor: "0.05"

# ── nginx edge hardening (M7) ─────────────────────────────────────────────────
# nginx_client_max_body_size — cap request body size.  Default 10g is large
#   enough for OCI base images and large Cargo crates while bounding abuse.
#   Set to 0 to restore the unlimited legacy behaviour.
nginx_client_max_body_size: "10g"

# Rate-limit zone for the auth surface (/api/v1/auth/).
# Zone size 10m ≈ 160 000 IP state slots; rate 30r/m prevents brute-force while
# allowing normal interactive use.  burst absorbs short token bursts; nodelay
# means excess requests are rejected immediately, not queued.
nginx_ratelimit_zone: "hort_auth"
nginx_ratelimit_size: "10m"
nginx_ratelimit_rate: "30r/m"
nginx_ratelimit_burst: 10

# TLS protocols — Mozilla intermediate profile (TLSv1.2 + TLSv1.3).
# The cipher list is a long security-policy constant embedded directly in
# roles/nginx/templates/ssl-hardening.conf.j2 to keep this file lint-clean.
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"

# ── PostgreSQL security settings ──────────────────────────────────────────────
# Shared between both flavors: applied via conf.d drop-in (native) and -c args
# (podman).  listen_addresses='' (socket-only) is native-ONLY — see the
# postgres_apt template.  For podman the postgres container must listen on the
# container network; TCP to the host is still blocked because the container
# unit does not PublishPort 5432.
pg_password_encryption: "scram-sha-256"
pg_log_connections: "on"
pg_log_disconnections: "on"
