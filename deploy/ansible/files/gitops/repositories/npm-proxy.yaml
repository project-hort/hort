apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: npm-proxy
spec:
  name: "npmjs.org pull-through (hardened)"
  description: "Private, quarantined+scanned npm proxy for hort's own CI toolchain bits. Read+ingest gated."
  format: npm
  type: proxy
  # SimpleIndex proxy — include_pending is required so a cold mirror's packument
  # is non-empty and `npm install` can resolve+bootstrap. See crates-proxy.yaml.
  indexMode: include_pending
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/npm-proxy
  proxy:
    upstreamUrl: "https://registry.npmjs.org"
  isPublic: false
  replicationPriority: local_only
