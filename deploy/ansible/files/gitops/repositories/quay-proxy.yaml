apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: quay-proxy
spec:
  name: "Quay.io pull-through (hardened)"
  description: "Private, quarantined+scanned quay.io proxy for hort's build tooling (buildah). Read+ingest gated."
  format: oci
  type: proxy
  # No indexMode (OCI — exact tag/digest requests). See dockerhub-proxy.yaml.
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/quay-proxy
  proxy:
    upstreamUrl: "https://quay.io"
  isPublic: false
  replicationPriority: local_only
