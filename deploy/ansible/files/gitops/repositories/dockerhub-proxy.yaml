apiVersion: project-hort.de/v1beta1
kind: ArtifactRepository
metadata:
  name: dockerhub-proxy
spec:
  name: "Docker Hub pull-through (hardened)"
  description: "Private, quarantined+scanned Docker Hub proxy for hort's base/tool images (alpine, postgres, rust, alpine/helm). Read+ingest gated."
  format: oci
  type: proxy
  # No indexMode: OCI clients request an exact tag/digest, so the index-mode
  # cold-start concern does not apply (the default released_only is correct).
  storage:
    backend: filesystem
    path: /var/lib/hort-server/cas/dockerhub-proxy
  proxy:
    upstreamUrl: "https://registry-1.docker.io"
  isPublic: false
  replicationPriority: local_only
