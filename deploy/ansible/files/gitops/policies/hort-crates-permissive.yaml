apiVersion: project-hort.de/v1beta1
kind: ScanPolicy
metadata:
  name: hort-crates-permissive
spec:
  # Class A first-party hosted repo (own published crates). Same rationale as
  # hort-oci-permissive: a `cargo publish` from the release CI must be fetchable
  # immediately, so opt out of quarantine-by-default rather than 503 the public
  # crate showcase for 24h.
  scope:
    repository: hort-crates
  severityThreshold: critical
  quarantineDuration: 0s
  requireApproval: false
  provenanceMode: off
  scanBackends: []
  licensePolicy: {}
