apiVersion: project-hort.de/v1beta1
kind: ScanPolicy
metadata:
  name: hort-crates-scan
spec:
  scope:
    repository: hort-crates
  severityThreshold: high
  # First-party hosted repo (own published crates) — SCANNED (osv) for advisories
  # in the crates' dependency closure. Small 1h observation window (humantime) so
  # a `cargo publish` from release CI is fetchable quickly, vs the proxies' 1-day
  # ramp. quarantineDuration is a gitops field (restart-to-apply), NOT a
  # deployment env var. Block bar `high`, matching the proxies: a high+ advisory
  # HOLDS the crate (recorded AND blocked). We control the Cargo.toml, so the fix
  # is to bump the flagged dependency (as with quinn-proto) before publishing.
  quarantineDuration: 1h
  requireApproval: false
  provenanceMode: off
  scanBackends: ["osv"]
  licensePolicy: {}
