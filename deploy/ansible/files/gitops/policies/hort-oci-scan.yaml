apiVersion: project-hort.de/v1beta1
kind: ScanPolicy
metadata:
  name: hort-oci-scan
spec:
  scope:
    repository: hort-oci
  severityThreshold: critical
  # First-party hosted repo — now SCANNED (trivy), defence in depth. The release
  # CI already trivy-scans these images pre-publish; this hosted re-scan catches
  # CVEs disclosed between build and pull. Small 1h observation window (humantime)
  # so the world-readable release face stays near-immediate, vs the proxies'
  # 1-day ramp. quarantineDuration is a gitops field (restart-to-apply), NOT a
  # deployment env var. Block bar kept at `critical` (vs the proxies' `high`) so a
  # newly-disclosed high base-image CVE is recorded but does not block release
  # distribution; tighten to `high` for a stricter gate.
  quarantineDuration: 1h
  requireApproval: false
  provenanceMode: off
  scanBackends: ["trivy"]
  licensePolicy: {}
