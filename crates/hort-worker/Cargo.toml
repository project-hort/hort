[package]
name = "hort-worker"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "hort v2 worker binary — multi-kind job dispatcher (scan, cron-rescan-tick, advisory-watch-tick, staging-sweep, noop)"

[lints]
workspace = true

[[bin]]
name = "hort-worker"
path = "src/main.rs"

[dependencies]
# Domain + application layers — same shared core as hort-server.
hort-domain                    = { path = "../hort-domain" }
hort-app                       = { path = "../hort-app" }

# Adapter layer — explicitly diverges from hort-server: this binary
# pulls in the scanner + advisory adapters, hort-server does not. The
# per-format HTTP crates (`hort-http-*`) are ABSENT here — the worker
# is not an HTTP edge.
hort-adapters-postgres         = { path = "../hort-adapters-postgres" }
hort-adapters-storage          = { path = "../hort-adapters-storage" }
# Checkpoint read+write adapter (Object-Lock anchored,
# Ed25519-signed). The worker registers the
# EventstoreCheckpointHandler which composes both halves.
hort-adapters-checkpoint-anchor = { path = "../hort-adapters-checkpoint-anchor" }
hort-adapters-ephemeral-memory = { path = "../hort-adapters-ephemeral-memory" }
hort-adapters-ephemeral-redis  = { path = "../hort-adapters-ephemeral-redis" }
hort-adapters-scanner-trivy    = { path = "../hort-adapters-scanner-trivy" }
hort-adapters-scanner-osv      = { path = "../hort-adapters-scanner-osv" }
hort-adapters-advisory-osv     = { path = "../hort-adapters-advisory-osv" }
# The cosign/Sigstore ProvenancePort adapter is wired into hort-worker
# ONLY (NOT hort-server). hort-server activates the `{"oci"}`
# capable-format set as plain data and never depends on this crate, so
# sigstore's transitive reqwest 0.13 stays out of the server binary
# (verified via `cargo tree`).
hort-adapters-provenance-sigstore = { path = "../hort-adapters-provenance-sigstore" }
# `KubernetesSecretWriterImpl` for the ServiceAccountRotationHandler.
# Optional at runtime — the worker logs and skips registration when
# `kube::Client::try_default()` fails (no kubeconfig, not in-cluster),
# so non-k8s deployments keep working.
hort-adapters-kubernetes       = { path = "../hort-adapters-kubernetes" }
# The scan orchestrator instantiates handlers via this crate's concrete
# `*FormatHandler` types, mirroring the `cli::reconcile_groups` pattern
# in hort-server.
hort-formats                   = { path = "../hort-formats" }
# The PrefetchTickHandler walks upstream catalogs via HttpUpstreamProxy.
# The proxy resolves authenticated upstreams via SecretPort; the prefetch
# tick targets the Anonymous catch-all mapping (npm/cargo/pypi public
# registries), but the adapter still requires a SecretPort instance so
# the dispatch (DispatchSecretPort) is wired with the same env+file shape
# hort-server uses.
hort-adapters-secrets          = { path = "../hort-adapters-secrets" }
hort-adapters-upstream-http    = { path = "../hort-adapters-upstream-http" }
# Extra-CA bundle parsing (mirrors the hort-server boot path, ADR 0010).
hort-config                    = { path = "../hort-config" }

anyhow                       = { workspace = true }
# Minimal internal-only `GET /metrics` listener. The worker is not an
# HTTP edge (no `hort-http-*` crates) but needs a single scrape route so
# the Prometheus recorder it already installs is readable. axum's built-in
# `serve` + a one-route Router is the smallest mirror of the server's
# admin-`/metrics` shape without dragging in the server crate.
axum                         = { workspace = true }
# `healthcheck` subcommand for the k8s livenessProbe exec gate. The
# worker had no clap surface before; the default (no subcommand)
# preserves the run-the-dispatcher behaviour, with `healthcheck` as the
# only addition.
clap                         = { workspace = true }
sqlx                         = { workspace = true }
thiserror                    = { workspace = true }
tokio                        = { workspace = true }
tokio-util                   = { workspace = true }
tracing                      = { workspace = true }
tracing-subscriber           = { workspace = true }
metrics                      = { workspace = true }
metrics-exporter-prometheus  = { workspace = true }
chrono                       = { workspace = true }
uuid                         = { workspace = true }
rand                         = { workspace = true }
# Atomic write of the merged subprocess CA bundle
# (`tempfile_in` + `persist`).
tempfile                     = { workspace = true }
# `ApiTokenUseCase` carries `Arc<ArcSwap<RbacEvaluator>>`. The worker's
# system-mint path skips the cap-vs-authority gate so the evaluator can
# be an empty one, but the constructor signature still requires the type.
arc-swap                     = { workspace = true }

[dev-dependencies]
tokio        = { workspace = true, features = ["test-util", "rt-multi-thread", "macros"] }
# The heartbeat test's MockJobsRepo implements `JobsRepository::mark_completed`,
# whose signature now carries a `serde_json::Value` result_summary param.
serde_json   = { workspace = true }
# `ServiceExt::oneshot` drives a `GET /metrics` request through the
# metrics-server Router without binding a real socket.
tower        = { workspace = true }
tracing-test = "0.2"
# Exercise `read_and_propagate`'s missing-file boot path, which reads
# `HORT_EXTRA_CA_BUNDLE`. Setting env vars is `unsafe` (2024 edition)
# and the workspace forbids `unsafe_code`, so `temp_env::with_var` is
# the only way to drive the env from a test. Same crate + version
# hort-server pins for its `read_extra_ca_bundle` tests.
temp-env     = "0.3"
# Assert the `hort_scan_record_outcome_failures_total` emission in the
# Failed-branch error path. `DebuggingRecorder` from `metrics-util` lets
# the test snapshot every counter increment without needing a Prometheus
# exporter on the receive side.
metrics-util = { workspace = true, features = ["debugging"] }
