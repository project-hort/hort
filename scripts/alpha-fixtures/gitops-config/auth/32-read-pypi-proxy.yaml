# PermissionGrant: [developer, ci-pusher] -> Read on pypi-proxy.
# Two-claim + per-repo (linter-clean). Paired with
# `35-prefetch-pypi-proxy.yaml`. See `31-read-npm-proxy.yaml` for the
# full reshape rationale.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: developers-read-pypi-proxy
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: read
  repository: pypi-proxy
