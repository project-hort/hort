# PermissionGrant: [developer, ci-pusher] -> Read on cargo-proxy.
# Two-claim + per-repo (linter-clean). Paired with
# `36-prefetch-cargo-proxy.yaml`. See `31-read-npm-proxy.yaml` for the
# full reshape rationale.
apiVersion: project-hort.de/v1beta1
kind: PermissionGrant
metadata:
  name: developers-read-cargo-proxy
spec:
  subject:
    kind: claims
    required: [developer, ci-pusher]
  permission: read
  repository: cargo-proxy
